<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PurePadel Coach</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100vh;}
#app{max-width:920px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.08);}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;padding:20px;}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#111;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-label{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.login-input{width:100%;padding:10px 14px;background:#f9f9f9;border:1.5px solid #e5e5e5;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:14px;transition:border-color .15s;}
.login-input:focus{border-color:#111;}
.login-btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
.login-btn:hover{background:#333;}
.login-err{color:#c0392b;font-size:13px;margin-top:10px;text-align:center;}

/* HEADER */
.header{background:#0a0a0a;border-bottom:3px solid #fff;padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;min-width:0;overflow:hidden;}
.logo{display:flex;align-items:baseline;flex-shrink:0;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;line-height:1;}
.logo-coach{font-size:10px;font-weight:500;letter-spacing:3px;color:#888;text-transform:uppercase;margin-left:10px;padding-left:10px;border-left:1px solid #444;line-height:1;}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.header-user{font-size:12px;color:#888;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.header-logout{font-size:11px;color:#888;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:none;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.header-logout:hover{color:#fff;}
@media(max-width:600px){
  .header{padding:0 10px;height:50px;}
  .header-user{display:none;}
  .logo-coach{display:none;}
  .header-img{height:34px!important;}
  .logo-text-wrap{display:none;}
}

/* TABS */
.tabs{background:#1a1a1a;display:flex;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap;flex-wrap:nowrap;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 12px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:#666;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:color .15s,border-color .15s;flex-shrink:0;}
.tab.active{color:#fff;border-bottom-color:#fff;}
.tab:hover:not(.active){color:#aaa;}

/* CONTENT */
.content{padding:20px;}

/* CARDS */
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;line-height:1;transition:all .15s;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-dark{background:#111;color:#fff;}.btn-dark:hover{background:#333;}
.btn-light{background:#f5f5f5;color:#555;border:1.5px solid #ddd;}.btn-light:hover{background:#e0e0e0;}
.btn-red{background:#fff0f0;color:#c0392b;border:1.5px solid #f5b7b1;}.btn-red:hover{background:#c0392b;color:#fff;}
.btn-green{background:#3ecf8e;color:#000;}.btn-green:hover{background:#2fb87a;}
.btn-yellow{background:#fff3f3;color:#c0392b;border:1.5px solid #f5b7b1;}
.btn[disabled]{opacity:.3;cursor:not-allowed;}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#111;}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;border:1.5px solid #ddd;color:#555;background:#fff;font-family:'DM Sans',sans-serif;transition:all .15s;}
.pill.active{background:#111;color:#fff;border-color:#111;}

/* FORM */
.fg{margin-bottom:14px;}
.flabel{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.finput{width:100%;padding:9px 13px;background:#fff;border:1.5px solid #ddd;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.finput:focus{border-color:#111;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px;}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#111;margin-bottom:6px;}
.modal-sub{font-size:12px;color:#aaa;margin-bottom:20px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:16px;border-top:1px solid #eee;margin-top:20px;}

/* ADMIN */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:16px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#111;}
.stat-lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:6px;background:#fff;}
.user-role{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;border:1px solid;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px;color:#bbb;}

/* PLAYERS */
.pcard{display:flex;align-items:center;gap:14px;}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;border:1.5px solid;}
.ptag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;border:1px solid;}

/* MATCHES */
.match-teams{display:grid;grid-template-columns:1fr 40px 1fr;gap:12px;align-items:center;}
.mp{display:flex;align-items:center;gap:8px;}
.mp.r{flex-direction:row-reverse;}
.mp-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;border:1.5px solid;flex-shrink:0;}

/* ATT */
.att-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:8px;cursor:pointer;background:#fff;margin-bottom:6px;transition:all .12s;}
.att-row.on{border-color:#111;background:#f9f9f9;}
.att-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.att-row.on .att-chk{background:#111;border-color:#111;}

/* IMPORT */
.paste-area{width:100%;min-height:80px;background:#fff;border:1.5px dashed #ccc;border-radius:8px;padding:10px;color:#111;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
var SB_URL = 'https://fhpqetgfrfhecbbzxguz.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZocHFldGdmcmZoZWNiYnp4Z3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM1MjUsImV4cCI6MjA5NTM1OTUyNX0.eiYZFR7cZEs2y7SM_82MvkJyA-afZ9N26COoBCGioAk';
var SHEET_ID = '1QE-NBCS7OIlBzYYtr9vv1W5Qd4MNfuIJd6wdjG9AM04';

var CATS=[
  {id:'forsvar',label:'Forsvar',color:'#1d6fb5',bg:'#e8f0fb',border:'#b3cef0'},
  {id:'angreb',label:'Angreb',color:'#c0392b',bg:'#fdecea',border:'#f5b7b1'},
  {id:'overhead',label:'Overheads',color:'#7d3c98',bg:'#f5eef8',border:'#d7bde2'},
  {id:'volley',label:'Volley',color:'#1e8449',bg:'#eafaf1',border:'#a9dfbf'},
  {id:'grundslag',label:'Grundslag',color:'#d35400',bg:'#fef5ec',border:'#f5cba7'},
  {id:'serve',label:'Serv',color:'#1a5276',bg:'#eaf2f8',border:'#aed6f1'},
  {id:'taktik',label:'Taktik',color:'#6c3483',bg:'#f4ecf7',border:'#d2b4de'},
  {id:'opvarmning',label:'Opvarmning',color:'#b7770d',bg:'#fef9e7',border:'#f9e79f'}
];

// ── STATE ────────────────────────────────────────────────────
var STATE = {
  session: null,
  profile: null,
  tab: 'drills',
  drills: [], sheetDrills: [],
  players: [], allProfiles: [], sessions: [],
  fcat: 'alle',
  modal: null, editDrill: null, editPlayer: null,
  matches: [], att: [],
  matchMode: 'balanced',
  ov: null, openSession: null,
  mvids: [],
  irows: [], showImp: false,
  loading: false,
  rounds: 1, baneGroups: 0,
  teams: [], events: [], eventResponses: [],
  editTeam: null, editEvent: null, openEvent: null,
  teamFilter: 'all'
};

// ── SUPABASE ─────────────────────────────────────────────────
function sbFetch(method, path, data, token) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, SB_URL + path, true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + (token || SB_KEY));
    xhr.setRequestHeader('Content-Type', 'application/json');
    if(method==='POST') xhr.setRequestHeader('Prefer','return=representation');
    xhr.onload = function(){
      try{resolve(JSON.parse(xhr.responseText));}catch(e){resolve({});}
    };
    xhr.onerror = function(){reject(new Error('Network error'));};
    xhr.send(data?JSON.stringify(data):null);
  });
}

function sbGet(table, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('GET', '/rest/v1/'+table+'?'+query, null, tok);
}
function sbPost(table, data) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('POST', '/rest/v1/'+table, data, tok);
}
function sbPatch(table, data, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('PATCH', '/rest/v1/'+table+'?'+query, data, tok);
}
function sbDelete(table, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('DELETE', '/rest/v1/'+table+'?'+query, null, tok);
}

function sbAuth(email, password) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SB_URL + '/auth/v1/token?grant_type=password', true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function(){
      try{
        var data = JSON.parse(xhr.responseText);
        resolve(data);
      }catch(e){resolve({});}
    };
    xhr.onerror = function(){resolve({error:'network'});};
    xhr.send(JSON.stringify({email:email,password:password}));
  });
}

// ── AUTH ─────────────────────────────────────────────────────
function saveSession(session) {
  STATE.session = session;
  localStorage.setItem('pp_session', JSON.stringify(session));
}

function loadSession() {
  try {
    var s = localStorage.getItem('pp_session');
    if(s) STATE.session = JSON.parse(s);
  } catch(e) {}
}

function logout() {
  STATE.session = null;
  STATE.profile = null;
  localStorage.removeItem('pp_session');
  render();
}

function loadProfile() {
  if(!STATE.session) return Promise.resolve();
  return sbGet('profiles', 'id=eq.'+STATE.session.user.id).then(function(data) {
    if(Array.isArray(data) && data.length > 0) {
      STATE.profile = data[0];
      // Set default tab based on role
      if(STATE.profile.role === 'superadmin') {
        STATE.tab = 'admin';
      } else {
        STATE.tab = 'drills';
      }
      // Update last_seen
      sbPatch('profiles', {last_seen: new Date().toISOString()}, 'id=eq.'+STATE.session.user.id);
    }
  });
}

// ── DATA ─────────────────────────────────────────────────────
function clubId() {
  if(!STATE.profile) return 'purepadel';
  if(STATE.profile.role === 'superadmin') return STATE.profile.club_id || 'purepadel';
  return STATE.profile.club_id || 'purepadel';
}

function loadPlayers() {
  var q = STATE.profile && STATE.profile.role === 'superadmin'
    ? 'order=name' : 'club_id=eq.'+clubId()+'&order=name';
  return sbGet('players', q).then(function(data) {
    if(Array.isArray(data)) STATE.players = data;
  }).catch(function(){});
}

function loadDrills() {
  var q = STATE.profile && STATE.profile.role === 'superadmin'
    ? 'order=created_at' : 'club_id=eq.'+clubId()+'&order=created_at';
  return sbGet('drills', q).then(function(data) {
    if(Array.isArray(data)) {
      STATE.drills = data.map(function(d) {
        // Normalize: if videos array is missing/empty but video_url exists, build it
        if((!d.videos||!d.videos.length) && d.video_url) {
          d.videos = [{type:'link',title:d.title,url:d.video_url}];
        }
        return d;
      });
    }
  });
}

function loadAllProfiles() {
  return sbGet('profiles', 'order=created_at').then(function(data) {
    if(Array.isArray(data)) STATE.allProfiles = data;
  }).catch(function(){});
}

function loadSessions(){
  return sbGet('sessions','club_id=eq.'+clubId()+'&order=date.desc').then(function(data){
    if(Array.isArray(data))STATE.sessions=data;
  }).catch(function(){});
}

function loadTeams(){
  var q=STATE.profile&&STATE.profile.role==='superadmin'
    ?'order=name'
    :'club_id=eq.'+clubId()+'&order=name';
  return sbGet('teams',q).then(function(data){
    if(Array.isArray(data))STATE.teams=data;
  }).catch(function(){});
}

function loadEvents(){
  var teamIds=STATE.teams.map(function(t){return t.id;});
  if(!teamIds.length){STATE.events=[];return Promise.resolve();}
  return sbGet('events','team_id=in.('+teamIds.join(',')+')&order=date').then(function(data){
    if(Array.isArray(data))STATE.events=data;
  });
}

function loadEventResponses(){
  var evIds=STATE.events.map(function(e){return e.id;});
  if(!evIds.length){STATE.eventResponses=[];return Promise.resolve();}
  return sbGet('event_responses','event_id=in.('+evIds.join(',')+')').then(function(data){
    if(Array.isArray(data))STATE.eventResponses=data;
  });
}

function loadTeamMembers(teamId){
  return sbGet('team_members','team_id=eq.'+teamId+'&order=joined_at');
}

function loadSheet() {
  return new Promise(function(resolve) {
    var done=false;
    var timer=setTimeout(function(){if(!done){done=true;resolve();}},5000);
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv', true);
    xhr.onload = function() {
      if(done)return; done=true; clearTimeout(timer);
      if(xhr.status===200) {
        var lines=xhr.responseText.trim().split('\n');
        if(lines.length<2){resolve();return;}
        var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase();});
        var drills=[];
        for(var i=1;i<lines.length;i++){
          var cols=[];var line=lines[i];var inQ=false;var cur='';
          for(var c=0;c<line.length;c++){if(line[c]==='"'){inQ=!inQ;}else if(line[c]===','&&!inQ){cols.push(cur);cur='';}else{cur+=line[c];}}
          cols.push(cur);
          var row={};for(var h=0;h<headers.length;h++)row[headers[h]]=(cols[h]||'').trim();
          var title=row.titel||row.title||'';if(!title)continue;
          var vurl=row.video_url||'';
          var videos=vurl?[{type:'link',title:title,url:vurl}]:[];
          drills.push({id:'sheet_'+i,title:title,cat:row.kategori||'grundslag',level:row.niveau||'Alle',players:parseInt(row.spillere)||2,description:row.beskrivelse||'',videos:videos,from_master:true});
        }
        STATE.sheetDrills=drills;
      }
      resolve();
    };
    xhr.onerror=function(){if(!done){done=true;clearTimeout(timer);resolve();}};
    xhr.send();
  });
}

function allDrills() { return STATE.sheetDrills.concat(STATE.drills); }

function loadAll() {
  STATE.loading = true; render();
  var promises = [loadPlayers(), loadDrills(), loadSheet(), loadSessions()];
  if(STATE.profile && STATE.profile.role === 'superadmin') promises.push(loadAllProfiles());
  Promise.all(promises).then(function(){
    return loadTeams();
  }).then(function(){
    return loadEvents();
  }).then(function(){
    return loadEventResponses();
  }).then(function(){
    STATE.loading = false; render();
  }).catch(function(err){
    console.error('loadAll fejl:', err);
    STATE.loading = false; render();
  });
}

// ── HELPERS ──────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gc(id){for(var i=0;i<CATS.length;i++)if(CATS[i].id===id)return CATS[i];return{label:id,color:'#555',bg:'#f5f5f5',border:'#ddd'};}
function stars(n){var s='';for(var i=0;i<5;i++)s+='<span style="color:'+(i<n?'#f5a623':'#ddd')+';font-size:12px;">'+(i<n?'&#9733;':'&#9734;')+'</span>';return s;}
function initials(name){var p=(name||'').split(' ');var s='';for(var i=0;i<Math.min(2,p.length);i++)if(p[i])s+=p[i][0];return s.toUpperCase();}
function acolor(id){var c=[{color:'#1d6fb5',border:'#b3cef0',bg:'#e8f0fb'},{color:'#1e8449',border:'#a9dfbf',bg:'#eafaf1'},{color:'#7d3c98',border:'#d7bde2',bg:'#f5eef8'},{color:'#c0392b',border:'#f5b7b1',bg:'#fdecea'},{color:'#b7770d',border:'#f9e79f',bg:'#fef9e7'}];var k=typeof id==='string'?id.charCodeAt(0):id;return c[Math.abs(k)%c.length];}
function sideInfo(s){if(s==='hojre'||s==='højre')return{label:'Højre',color:'#d35400',bg:'#fef5ec',border:'#f5cba7'};if(s==='venstre')return{label:'Venstre',color:'#1d6fb5',bg:'#e8f0fb',border:'#b3cef0'};return{label:'Begge',color:'#1e8449',bg:'#eafaf1',border:'#a9dfbf'};}
function ytid(url){var m=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^?&\s]{11})/);return m?m[1]:null;}
function formatDate(d){if(!d)return'–';return new Date(d).toLocaleDateString('da-DK');}
function daysLeft(d){if(!d)return 9999;try{var diff=new Date(d)-new Date();return Math.ceil(diff/86400000);}catch(e){return 9999;}}

// ── RENDER ───────────────────────────────────────────────────
function render() {
  var app = document.getElementById('app');
  if(!app) return;

  // Not logged in
  if(!STATE.session || !STATE.profile) {
    app.innerHTML = rLogin();
    return;
  }

  // Check subscription
  var p = STATE.profile;
  if(p.role !== 'superadmin' && p.subscription_expires) {
    var days = daysLeft(p.subscription_expires);
    if(days < 0) {
      app.innerHTML = rExpired();
      return;
    }
  }

  var tabs = [];
  if(p.role === 'superadmin') {
    tabs = [{id:'admin',label:'Admin'},{id:'drills',label:'Øvelser'},{id:'players',label:'Spillere'},{id:'matches',label:'Kamp'},{id:'hold',label:'Hold'}];
    if(STATE.tab === 'admin' && p.role !== 'superadmin') STATE.tab = 'drills';
  } else {
    tabs = [{id:'drills',label:'Øvelser'},{id:'players',label:'Spillere'},{id:'matches',label:'Kamp'},{id:'hold',label:'Hold'},{id:'historik',label:'Historik'},{id:'konto',label:'Konto'}];
    if(STATE.tab === 'admin') STATE.tab = 'drills';
  }

  var html = '';

// ── ADMIN BOARD ──────────────────────────────────────────────
function rAdmin() {
  var profiles = STATE.allProfiles;
  var active = profiles.filter(function(p){return p.role!=='superadmin'&&daysLeft(p.subscription_expires)>=0;});
  var expiring = active.filter(function(p){var d=daysLeft(p.subscription_expires);return d>=0&&d<30;});
  var expired = profiles.filter(function(p){return p.role!=='superadmin'&&daysLeft(p.subscription_expires)<0;});

  var html = '<div class="sec-head"><div class="sec-title">Admin Board</div>'
    +'<button class="btn btn-dark" onclick="openModal(\'add_user\')">+ Opret bruger</button></div>';

  // Stats
  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num">'+active.length+'</div><div class="stat-lbl">Aktive</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#b7770d;">'+expiring.length+'</div><div class="stat-lbl">Udløber snart</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#c0392b;">'+expired.length+'</div><div class="stat-lbl">Udløbet</div></div>';
  html += '</div>';

  // User list
  if(profiles.length === 0) {
    html += '<div class="empty">Ingen brugere endnu – opret den første</div>';
  } else {
    for(var i=0;i<profiles.length;i++){
      var p=profiles[i];
      if(p.role==='superadmin') continue;
      var days=daysLeft(p.subscription_expires);
      var statusColor=days<0?'#c0392b':(days<30&&days>=0)?'#b7770d':'#3ecf8e';
      var statusLabel=days<0?'Udløbet':(days<30&&days>=0)?days+' dage':'Aktiv';
      var roleColor=p.subscription_type==='club'?'#1d6fb5':'#7d3c98';
      var roleBg=p.subscription_type==='club'?'#e8f0fb':'#f5eef8';
      var roleBorder=p.subscription_type==='club'?'#b3cef0':'#d7bde2';
      var roleLabel=p.subscription_type==='club'?'Forening':'Træner';

      html += '<div class="user-row" style="flex-direction:column;align-items:stretch;gap:6px;">';
      html += '<div style="display:flex;align-items:center;gap:8px;">';
      html += '<div class="status-dot" style="background:'+statusColor+';flex-shrink:0;"></div>';
      html += '<span style="font-size:14px;font-weight:600;color:#111;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(p.name&&p.name!=='null'?p.name:p.email)+'</span>';
      html += '<span class="user-role" style="color:'+roleColor+';background:'+roleBg+';border-color:'+roleBorder+';flex-shrink:0;">'+roleLabel+'</span>';
      html += '</div>';
      html += '<div style="font-size:12px;color:#888;padding-left:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(p.email||'')+(p.club_name&&p.club_name!=='null'?' · '+esc(p.club_name):'')+'</div>';

        html+='<div class="mp"><div class="mp-av" style="color:'+acolor(p2.id).color+';background:'+acolor(p2.id).bg+';border-color:'+acolor(p2.id).border+';">'+initials(p2.name)+'</div><div><div style="font-size:13px;font-weight:600;color:#111;">'+esc(p2.name)+(tw1?' <span style="color:#d35400;font-size:11px;">⚠</span>':'')+'</div><div style="font-size:11px;color:#aaa;">'+('★'.repeat(p2.level))+(tw1?' · <span style="color:#d35400;">begge foretrækker '+p2.side+' side</span>':'')+'</div></div></div>';
        for(var ti=0;ti<tm1.length;ti++){var tp=tm1[ti].p;var tpar=tm1[ti].partner;var ta=acolor(tp.id);var ws=tw1&&tp.side!=='begge'&&tpar.side!=='begge'&&tp.side===tpar.side;html+='<div class="mp"><div class="mp-av" style="color:'+ta.color+';background:'+ta.bg+';border-color:'+ta.border+';">'+initials(tp.name)+'</div><div><div style="font-size:13px;font-weight:600;color:#111;">'+esc(tp.name)+(ws?' <span style="color:#d35400;font-size:11px;" title="Spiller på ikke-foretrukken side">⚠</span>':'')+'</div><div style="font-size:11px;color:#aaa;">'+('★'.repeat(tp.level))+(ws?' · <span style="color:#d35400;">foretrækker højre side</span>':'')+'</div></div></div>';}
        html+='</div><div style="font-family:Bebas Neue,sans-serif;font-size:20px;color:#ccc;text-align:center;">VS</div><div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">';
        var tm2=[{p:p3,partner:p4},{p:p4,partner:p3}];
        for(var ti2=0;ti2<tm2.length;ti2++){var tp2=tm2[ti2].p;var tpar2=tm2[ti2].partner;var ta2=acolor(tp2.id);var ws2=tw2&&tp2.side!=='begge'&&tpar2.side!=='begge'&&tp2.side===tpar2.side;html+='<div class="mp r"><div class="mp-av" style="color:'+ta2.color+';background:'+ta2.bg+';border-color:'+ta2.border+';">'+initials(tp2.name)+'</div><div style="text-align:right;"><div style="font-size:13px;font-weight:600;color:#111;">'+(ws2?'<span style="color:#d35400;font-size:11px;">⚠</span> ':'')+esc(tp2.name)+'</div><div style="font-size:11px;color:#aaa;">'+(ws2?'<span style="color:#d35400;">foretrækker venstre side</span> · ':'')+''+('★'.repeat(tp2.level))+'</div></div></div>';}
        html+='</div></div>';
        html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;"><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Hold 1: '+pct+'% · Hold 2: '+(100-pct)+'%</div><div style="height:4px;background:#eee;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+sc+';border-radius:2px;"></div></div></div>';
        html+='</div>';
      }
      // Single round coach
      var coachIds=STATE.matches.length>0&&STATE.matches[0].reserveIds?STATE.matches[0].reserveIds:[];
      if(coachIds.length>0){
        html+='<div class="card" style="background:#fef9e7;border-color:#f9e79f;">';
        html+='<div style="font-size:11px;font-weight:600;color:#b7770d;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">📋 Træner med coach</div>';
        for(var ci=0;ci<coachIds.length;ci++){
          var cp=STATE.players.filter(function(p){return p.id===coachIds[ci];})[0];
          if(!cp)continue;
          var ca=acolor(cp.id);var cs=sideInfo(cp.side);
          html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);">';
          html+='<div class="avatar" style="width:32px;height:32px;font-size:11px;color:'+ca.color+';background:'+ca.bg+';border-color:'+ca.border+';">'+initials(cp.name)+'</div>';
          html+='<div><div style="font-size:14px;font-weight:600;color:#111;">'+esc(cp.name)+'</div><div style="font-size:11px;color:#888;">'+('★'.repeat(cp.level))+' · '+cs.label+'</div></div>';
          html+='</div>';
        }
        html+='</div>';
      }
    }
      // Legend if any wrong side placements
    var hasWrongSide=false;
    for(var wi=0;wi<STATE.matches.length;wi++){
      var wm=STATE.matches[wi];
      var wp1=STATE.players.filter(function(p){return p.id===wm.t1[0];})[0];
      var wp2=STATE.players.filter(function(p){return p.id===wm.t1[1];})[0];
      var wp3=STATE.players.filter(function(p){return p.id===wm.t2[0];})[0];
      var wp4=STATE.players.filter(function(p){return p.id===wm.t2[1];})[0];
      if(teamSideWarning(wp1,wp2)||teamSideWarning(wp3,wp4)){hasWrongSide=true;break;}
    }
    if(hasWrongSide){
      html+='<div style="background:#fef5ec;border:1px solid #f5cba7;border-radius:8px;padding:10px 14px;font-size:12px;color:#d35400;margin-bottom:16px;">⚠ Et eller flere hold har to spillere der foretrækker samme side – de bør selv aftale hvem der spiller venstre/højre</div>';
    }
    html+='<div style="height:1px;background:#e5e5e5;margin:20px 0;"></div>';
  }

  // Attendees
  // Side count
  var attP=STATE.players.filter(function(p){return STATE.att.indexOf(p.id)>-1;});
  var cV=attP.filter(function(p){return p.side==='venstre';}).length;
  var cH=attP.filter(function(p){return p.side==='hojre'||p.side==='højre';}).length;
  var cB=attP.filter(function(p){return p.side==='begge';}).length;

  // Bane dropdown
  if(!STATE.baneGroups)STATE.baneGroups=0;
  var maxBG=Math.floor(STATE.att.length/4);
  if(maxBG>=2){
    html+='<div class="card" style="margin-bottom:16px;"><div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Bane-gruppering</div>';

    html+='<select onchange="setBaneGroups(this.value)" style="width:100%;padding:9px 13px;background:#fff;border:1.5px solid #ddd;border-radius:8px;color:#111;font-family:DM Sans,sans-serif;font-size:14px;outline:none;">';
    html+='<option value="0" '+(STATE.baneGroups===0?'selected':'')+'>Ingen opdeling</option>';
    for(var bg=2;bg<=maxBG;bg++){html+='<option value="'+bg+'" '+(STATE.baneGroups===bg?'selected':'')+'>Første '+bg+' baner ('+bg*4+' spillere) separat</option>';}
    html+='</select></div>';
  }

  html+='<div class="card">';
  var allChecked=STATE.att.length===STATE.players.length&&STATE.players.length>0;
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
  html+='<div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;">Tilmeldte i dag: '+STATE.att.length+' / '+STATE.players.length+'</div>';
  html+='<div onclick="toggleAll()" style="display:flex;align-items:center;gap:8px;cursor:pointer;">';
  html+='<div style="width:18px;height:18px;border-radius:4px;border:1.5px solid '+(allChecked?'#111':'#ccc')+';display:flex;align-items:center;justify-content:center;background:'+(allChecked?'#111':'transparent')+';"><span style="color:#fff;font-size:11px;font-weight:700;">'+(allChecked?'✓':'')+'</span></div>';
  html+='<span style="font-size:12px;color:#555;font-weight:600;">Vælg alle</span></div></div>';
  if(STATE.att.length>0){html+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><span style="font-size:12px;padding:4px 10px;border-radius:6px;background:#e8f0fb;border:1px solid #b3cef0;color:#1d6fb5;font-weight:600;">Venstre: '+cV+'</span><span style="font-size:12px;padding:4px 10px;border-radius:6px;background:#fef5ec;border:1px solid #f5cba7;color:#d35400;font-weight:600;">Højre: '+cH+'</span><span style="font-size:12px;padding:4px 10px;border-radius:6px;background:#eafaf1;border:1px solid #a9dfbf;color:#1e8449;font-weight:600;">Begge: '+cB+'</span></div>';}
  for(var pi=0;pi<STATE.players.length;pi++){
    var p=STATE.players[pi];var ac=acolor(p.id);var on=STATE.att.indexOf(p.id)>-1;
    html+='<div class="att-row'+(on?' on':'')+'" onclick="togAtt(\''+p.id+'\')">';
    html+='<div class="att-chk"><span style="color:#fff;font-size:11px;font-weight:700;">'+(on?'✓':'')+'</span></div>';
    html+='<div class="avatar" style="width:30px;height:30px;font-size:11px;color:'+ac.color+';background:'+ac.bg+';border-color:'+ac.border+';">'+initials(p.name)+'</div>';
    html+='<div style="flex:1;"><div style="font-size:14px;font-weight:500;">'+esc(p.name)+'</div><div style="font-size:12px;color:#aaa;">'+('★'.repeat(p.level))+('☆'.repeat(5-p.level))+' · '+sideInfo(p.side).label+'</div></div>';
    html+='</div>';
  }
  if(STATE.att.length<4) html+='<div style="font-size:13px;color:#888;margin-top:8px;">Vælg mindst 4 spillere</div>';
  html+='</div>';
  return html;
}

function rHistorik(){
  var html='<div class="sec-head"><div class="sec-title">Historik</div></div>';
  if(STATE.sessions.length===0){
    html+='<div class="empty">Ingen gemte træninger endnu<br><br><small style="color:#bbb;">Gem en træning fra Kampopsætning</small></div>';
    return html;
  }
  for(var si=0;si<STATE.sessions.length;si++){
    var s=STATE.sessions[si];
    var matches=s.matches||[];
    var playerIds=s.player_ids||[];
    var rounds=s.rounds||1;
    html+='<div class="card" style="margin-bottom:8px;">';
    html+='<div style="display:flex;align-items:start;justify-content:space-between;gap:12px;">';
    html+='<div style="flex:1;">';
    html+='<div style="font-size:15px;font-weight:600;color:#111;margin-bottom:4px;">'+esc(s.name)+'</div>';
    html+='<div style="font-size:12px;color:#888;">'+formatDate(s.date)+' · '+playerIds.length+' spillere · '+matches.length+' kampe'+(rounds>1?' · '+rounds+' runder':'')+'</div>';
    html+='</div>';
    html+='<button onclick="deleteSession(this.dataset.id)" data-id="'+s.id+'" style="background:#fff0f0;color:#c0392b;border:1.5px solid #f5b7b1;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;flex-shrink:0;">Slet</button>';
    html+='</div>';

    // Show matches collapsed - click to expand
    html+='<div onclick="toggleSession(this.dataset.id)" data-id="'+s.id+'" style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html+='<span style="font-size:12px;color:#888;font-weight:600;letter-spacing:.5px;text-transform:uppercase;">Vis kampe</span>';
    html+='<span style="font-size:12px;color:#aaa;">'+(STATE.openSession===s.id?'▲':'▼')+'</span>';
    html+='</div>';

    if(STATE.openSession===s.id){
      html+='<div style="margin-top:10px;">';
      var baneCount=Math.ceil(matches.length/rounds);

      if(rounds>1){
        // Group by round
        var roundGroups={};
        for(var mi=0;mi<matches.length;mi++){
          var m=matches[mi];
          var rnd=m.round||Math.floor(mi/baneCount)+1;
          if(!roundGroups[rnd])roundGroups[rnd]=[];
          roundGroups[rnd].push(m);
        }
        for(var rnd=1;rnd<=rounds;rnd++){
          var rMatches=roundGroups[rnd]||[];
          html+='<div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;">Runde '+rnd+'</div>';
          for(var mi=0;mi<rMatches.length;mi++){
            var m=rMatches[mi];

            html+='<span style="color:#1d6fb5;font-weight:600;">'+esc(p1n)+' / '+esc(p2n)+'</span>';
            html+='<span style="color:#aaa;margin:0 8px;">vs</span>';
            html+='<span style="color:#c0392b;font-weight:600;">'+esc(p3n)+' / '+esc(p4n)+'</span>';
            html+='</div>';
          }
          // Show coach players for this round
          var coachIds=rMatches.length>0&&rMatches[0].reserveIds?rMatches[0].reserveIds:[];
          if(coachIds.length>0){
            html+='<div style="padding:8px 10px;background:#fef9e7;border:1px solid #f9e79f;border-radius:6px;margin-bottom:6px;font-size:13px;">';

              for(var i=0;i<matches.length;i++){if(matches[i].p1name&&matches[i].t1&&matches[i].t1[0]===id)return matches[i].p1name;}
              return getPlayerName(id);

            html+='<span style="color:#b7770d;font-weight:600;">'+coachNames.map(function(n){return esc(n);}).join(' / ')+'</span>';
            html+='</div>';
          }
        }
      } else {
        // Single round
        for(var mi=0;mi<matches.length;mi++){
          var m=matches[mi];
          var p1n=m.p1name||getPlayerName(m.t1[0]);
          var p2n=m.p2name||getPlayerName(m.t1[1]);
          var p3n=m.p3name||getPlayerName(m.t2[0]);
          var p4n=m.p4name||getPlayerName(m.t2[1]);
          html+='<div style="padding:8px 10px;background:#f9f9f9;border-radius:6px;margin-bottom:6px;font-size:13px;">';
          html+='<span style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">Bane '+(mi+1)+'</span>';
          html+='<span style="color:#1d6fb5;font-weight:600;">'+esc(p1n)+' / '+esc(p2n)+'</span>';
          html+='<span style="color:#aaa;margin:0 8px;">vs</span>';
          html+='<span style="color:#c0392b;font-weight:600;">'+esc(p3n)+' / '+esc(p4n)+'</span>';
          html+='</div>';
        }
        // Coach for single round
        var coachIds=matches.length>0&&matches[0].reserveIds?matches[0].reserveIds:[];
        if(coachIds.length>0){
          html+='<div style="padding:8px 10px;background:#fef9e7;border:1px solid #f9e79f;border-radius:6px;margin-bottom:6px;font-size:13px;">';
          html+='<span style="font-size:10px;font-weight:600;color:#b7770d;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">📋 Coach</span>';
          html+='<span style="color:#b7770d;font-weight:600;">'+coachIds.map(function(id){return esc(getPlayerName(id));}).join(' / ')+'</span>';
          html+='</div>';
        }
      }
      html+='</div>';
    }
    html+='</div>';
  }
  return html;
}

window.teamSideWarning=function(pa, pb){
  // Returns true if team has two players preferring same side
  if(!pa||!pb)return false;
  var sa=pa.side; var sb=pb.side;
  if(sa==='begge'||sb==='begge')return false;
  return sa===sb; // both same side = warning
}
window.playerSideWarn=function(player, other){
  // Returns true only for the specific player that is "out of place"
  // i.e. when both prefer same side, the one whose side matches the other is NOT warned
  // Actually we just warn both - but show the side preference as info
  if(!player||!other)return false;
  if(player.side==='begge'||other.side==='begge')return false;
  return player.side===other.side;
}

function getPlayerName(id){
  for(var i=0;i<STATE.players.length;i++)if(STATE.players[i].id===id)return STATE.players[i].name;
  return id||'?';
}


// ── HELPERS ──────────────────────────────────────────────────
function getPlayerName(id){
  for(var i=0;i<STATE.players.length;i++)if(STATE.players[i].id===id)return STATE.players[i].name||'Ukendt';
  return 'Ukendt spiller';
}
function localDT(iso){
  if(!iso)return'';
  var d=new Date(iso);
  var pad=function(n){return n<10?'0'+n:String(n);};
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}

function rHold(){
  var teams=STATE.teams;
  var role=STATE.profile?STATE.profile.role:'';

  var html='<div class="sec-head"><div class="sec-title">Hold &amp; Tr&#230;ninger</div>';
  if(canManageTeams)html+='<button class="btn btn-dark btn-sm" onclick="openModal(\'edit_team\')">+ Nyt hold</button>';
  html+='</div>';

  if(!teams.length){
    html+='<div class="empty">Ingen hold endnu'+(canManageTeams?' &#8211; opret det f&#248;rste hold':'')+'</div>';
    return html;
  }

  // Team filter pills
  html+='<div class="pills" style="margin-bottom:16px;">';
  html+='<span class="pill'+(STATE.teamFilter==='all'?' active':'')+'" onclick="STATE.teamFilter=\'all\';render()">Alle</span>';
  for(var ti=0;ti<teams.length;ti++){
    var tm=teams[ti];
    html+='<span class="pill'+(STATE.teamFilter===tm.id?' active':'')+'" onclick="STATE.teamFilter=\''+tm.id+'\';render()">'+esc(tm.name)+'</span>';
  }
  html+='</div>';

  var filteredTeams=STATE.teamFilter==='all'?teams:teams.filter(function(t){return t.id===STATE.teamFilter;});

  for(var i=0;i<filteredTeams.length;i++){
    var team=filteredTeams[i];
    var teamEvents=STATE.events.filter(function(e){return e.team_id===team.id;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var now=new Date();
    var upcoming=teamEvents.filter(function(e){return new Date(e.date)>=now;});
    var past=teamEvents.filter(function(e){return new Date(e.date)<now;});
    var typeLabel=team.type==='dame'?'Damehold':team.type==='mix'?'Mixhold':'Herrehold';

    html+='<div style="border:1.5px solid #e5e5e5;border-radius:12px;margin-bottom:16px;overflow:hidden;">';
    html+='<div style="background:#f9f9f9;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">';
    html+='<div>';
    html+='<div style="font-size:15px;font-weight:700;color:#111;">'+esc(team.name)+'</div>';
    html+='<div style="font-size:12px;color:#888;margin-top:2px;">'+typeLabel+' &bull; '+upcoming.length+' kommende</div>';
    html+='</div>';
    html+='<div style="display:flex;gap:6px;">';
    html+='<button class="btn btn-dark btn-sm" onclick="openNewEvent(\''+team.id+'\')">+ Begivenhed</button>';
    if(canManageTeams)html+='<button class="btn btn-light btn-sm" onclick="editTeam(\''+team.id+'\')">&#9881;</button>';
    html+='</div></div>';

    if(!teamEvents.length){
      html+='<div style="padding:14px 16px;font-size:13px;color:#aaa;">Ingen begivenheder endnu</div>';
    } else {
      for(var ei=0;ei<upcoming.length;ei++){html+=rEventRow(upcoming[ei],team,false);}
      if(past.length){
        html+='<div style="padding:8px 16px;font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;border-top:1px solid #f0f0f0;">Tidligere</div>';
        for(var pi=0;pi<Math.min(3,past.length);pi++){html+=rEventRow(past[past.length-1-pi],team,true);}
      }
    }
    html+='</div>';
  }
  return html;
}

function rEventRow(ev,team,isPast){
  var responses=STATE.eventResponses.filter(function(r){return r.event_id===ev.id;});
  var yesCount=responses.filter(function(r){return r.response==='yes';}).length;
  var noCount=responses.filter(function(r){return r.response==='no';}).length;
  var d=new Date(ev.date);
  var dateStr=d.toLocaleDateString('da-DK',{weekday:'short',day:'numeric',month:'short'});
  var timeStr=d.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
  var isMatch=ev.type==='match';
  var typeColor=isMatch?'#c0392b':'#1d6fb5';
  var typeBg=isMatch?'#fdecea':'#e8f0fb';
  var typeBorder=isMatch?'#f5b7b1':'#b3cef0';
  var typeLabel=isMatch?'Kamp':'Tr&#230;ning';
  var deadline=ev.signup_deadline?new Date(ev.signup_deadline):null;
  var deadlinePast=deadline&&deadline<new Date();
  var isOpen=STATE.openEvent===ev.id;

  var html='<div style="border-top:1px solid #f0f0f0;'+(isPast?'opacity:0.65;':'')+'">';
  html+='<div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleEvent(\''+ev.id+'\')">';
  html+='<div style="flex:1;min-width:0;">';
  html+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">';
  html+='<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;border:1px solid;color:'+typeColor+';background:'+typeBg+';border-color:'+typeBorder+';">'+typeLabel+'</span>';
  if(isMatch&&ev.home_away){html+='<span style="font-size:10px;color:#888;">'+(ev.home_away==='home'?'Hjemme':'Ude')+'</span>';}
  html+='<span style="font-size:14px;font-weight:600;color:#111;">'+esc(ev.title)+'</span>';
  html+='</div>';
  html+='<div style="font-size:12px;color:#888;margin-top:3px;">'+dateStr+' &bull; '+timeStr;
  if(ev.location)html+=' &bull; '+esc(ev.location);
  html+='</div>';
  if(deadline){html+='<div style="font-size:11px;color:'+(deadlinePast?'#c0392b':'#b7770d')+';margin-top:2px;">Frist: '+deadline.toLocaleDateString('da-DK',{day:'numeric',month:'short'})+'</div>';}
  html+='</div>';
  html+='<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:10px;">';
  html+='<span style="font-size:13px;color:#1e8449;font-weight:700;">'+yesCount+'</span>';
  html+='<span style="font-size:12px;color:#aaa;">/</span>';
  html+='<span style="font-size:13px;color:#c0392b;font-weight:700;">'+noCount+'</span>';
  html+='<button class="btn btn-light btn-sm" onclick="event.stopPropagation();editEvent(\''+ev.id+'\')">&#9881;</button>';
  html+='<span style="color:#aaa;font-size:12px;">'+(isOpen?'&#9650;':'&#9660;')+'</span>';
  html+='</div></div>';

  if(isOpen){html+=rEventDetail(ev,responses);}
  html+='</div>';
  return html;
}

function rEventDetail(ev,responses){
  var yes=responses.filter(function(r){return r.response==='yes';});
  var no=responses.filter(function(r){return r.response==='no';});
  var unanswered=STATE.players.filter(function(p){
    return !responses.find(function(r){return r.player_id===p.id;});
  });
  var html='<div style="background:#f9f9f9;padding:14px 16px;border-top:1px solid #eee;">';

  // YES
  html+='<div style="font-size:11px;font-weight:700;color:#1e8449;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Tilmeldt ('+yes.length+')</div>';
  if(!yes.length)html+='<div style="font-size:12px;color:#aaa;margin-bottom:8px;">Ingen tilmeldt endnu</div>';
  for(var i=0;i<yes.length;i++){
    var r=yes[i];
    html+='<div style="font-size:13px;padding:5px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;">';
    html+='<span style="font-weight:500;">'+esc(getPlayerName(r.player_id))+'</span>';
    if(r.note)html+='<span style="font-size:11px;color:#888;font-style:italic;">'+esc(r.note)+'</span>';
    html+='</div>';
  }

  // NO
  html+='<div style="font-size:11px;font-weight:700;color:#c0392b;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;">Frameldt ('+no.length+')</div>';
  if(!no.length)html+='<div style="font-size:12px;color:#aaa;margin-bottom:8px;">Ingen frameldt</div>';
  for(var j=0;j<no.length;j++){
    var rn=no[j];
    html+='<div style="font-size:13px;padding:5px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;">';
    html+='<span style="font-weight:500;">'+esc(getPlayerName(rn.player_id))+'</span>';
    if(rn.note)html+='<span style="font-size:11px;color:#888;font-style:italic;">'+esc(rn.note)+'</span>';
    html+='</div>';
  }

  // NOT ANSWERED
  html+='<div style="font-size:11px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;">Ikke svaret ('+unanswered.length+')</div>';
  if(!unanswered.length)html+='<div style="font-size:12px;color:#aaa;">Alle har svaret</div>';
  for(var k=0;k<unanswered.length;k++){
    html+='<div style="font-size:13px;color:#aaa;padding:5px 0;border-bottom:1px solid #eee;">'+esc(unanswered[k].name)+'</div>';
  }

  // Actions
  html+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">';
  html+='<button class="btn btn-dark btn-sm" onclick="sendReminder(\''+ev.id+'\')">Send p&#229;mindelse til ikke-svar</button>';
  html+='<button class="btn btn-red btn-sm" onclick="deleteEvent(\''+ev.id+'\')">Slet begivenhed</button>';
  html+='</div></div>';
  return html;
}

window.saveTeam=function(){
  var role=STATE.profile?STATE.profile.role:'';
  if(role!=='superadmin'&&role!=='club_admin'){alert('Ingen adgang');return;}
  var name=(document.getElementById('tmN')||{}).value||'';
  if(!name.trim()){alert('Angiv et holdnavn');return;}
  var type=(document.getElementById('tmT')||{}).value||'herre';
  var cid=clubId();
  if(role==='superadmin'){
    var clubSel=document.getElementById('tmClub');
    if(clubSel&&clubSel.value){

window.sendReminder=function(eventId){
  // Browser push reminder to all unanswered players for this event
  var responses=STATE.eventResponses.filter(function(r){return r.event_id===eventId;});
  var answeredIds=responses.map(function(r){return r.player_id;});
  var unanswered=STATE.players.filter(function(p){return answeredIds.indexOf(p.id)<0;});
  if(!unanswered.length){alert('Alle har allerede svaret!');return;}
  // Find event
  var ev=null;
  for(var i=0;i<STATE.events.length;i++)if(STATE.events[i].id===eventId){ev=STATE.events[i];break;}
  if(!ev)return;
  var d=new Date(ev.date);
  var dateStr=d.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  var msg='P\u00e5mindelse: Husk at tilmelde dig "'+ev.title+'" d. '+dateStr+'. Tilmeld dig nu i appen.';
  // Use Notification API if available
  if('Notification' in window){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted'){
        new Notification('PurePadel P\u00e5mindelse',{body:msg,icon:'/favicon.ico'});
        alert('P\u00e5mindelse sendt til '+unanswered.length+' spiller(e) der ikke har svaret.');
      } else {
        alert('Notifikation ikke tilladt. P\u00e5mindelsesbeskeden ville lyde:\n\n'+msg+'\n\nSendes til: '+unanswered.map(function(p){return p.name;}).join(', '));
      }
    });
  } else {
    alert('P\u00e5mindelsesbeskeden:\n\n'+msg+'\n\nSendes til: '+unanswered.map(function(p){return p.name;}).join(', '));
  }
};

window.genMatches=function(){
  if(STATE.att.length<4)return;
  var allP=STATE.players;
  var ps=[];
  for(var i=0;i<STATE.att.length;i++){for(var j=0;j<allP.length;j++)if(allP[j].id===STATE.att[i]){ps.push(allP[j]);break;}}

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function sideScore(p){
    // venstre=0, begge=1, hojre=2 - for sorting within team
    if(p.side==='venstre')return 0;
    if(p.side==='begge')return 1;
    return 2;
  }

  function goodPair(a, b){
    // Returns true if a+b make a good side combination
    if(a.side==='begge'||b.side==='begge')return true;
    return a.side!==b.side; // one left + one right
  }

  function makePairs(grp, mode){
    var m=[];
    if(mode==='balanced'){
      grp.sort(function(a,b){return b.level-a.level;});
      for(var i=0;i<grp.length-3;i+=4){
        var g=grp.slice(i,i+4);
        // Try to make good side pairs: best+worst vs 2nd+3rd
        // Check if swapping gives better side balance
        var t1a=[g[0],g[3]], t2a=[g[1],g[2]]; // default
        var t1b=[g[0],g[1]], t2b=[g[2],g[3]]; // alt 1
        var t1c=[g[0],g[2]], t2c=[g[1],g[3]]; // alt 2
        function pairScore(t1,t2){
          var s=0;
          if(goodPair(t1[0],t1[1]))s++;
          if(goodPair(t2[0],t2[1]))s++;
          return s;
        }
        var best={t1:t1a,t2:t2a,s:pairScore(t1a,t2a)};
        if(pairScore(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:pairScore(t1b,t2b)};
        if(pairScore(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:pairScore(t1c,t2c)};
        m.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
      }
    } else if(mode==='split'){
      grp.sort(function(a,b){return b.level-a.level;});
      var h=Math.floor(grp.length/2);
      var top=shuffle(grp.slice(0,h));var bot=shuffle(grp.slice(h));
      function splitPairs(arr){
        var res=[];
        for(var i=0;i<arr.length-3;i+=4){
          var g=arr.slice(i,i+4);
          var t1a=[g[0],g[1]],t2a=[g[2],g[3]];
          var t1b=[g[0],g[2]],t2b=[g[1],g[3]];
          var t1c=[g[0],g[3]],t2c=[g[1],g[2]];
          function ps2(t1,t2){var s=0;if(goodPair(t1[0],t1[1]))s++;if(goodPair(t2[0],t2[1]))s++;return s;}
          var best={t1:t1a,t2:t2a,s:ps2(t1a,t2a)};
          if(ps2(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:ps2(t1b,t2b)};
          if(ps2(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:ps2(t1c,t2c)};
          res.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
        }
        return res;
      }
      // If both halves have at least 4 players each, split within each group
      // Otherwise pair across top vs bottom (works with just 4 players total)
      if(top.length>=4&&bot.length>=4){
        m=splitPairs(top).concat(splitPairs(bot));
      } else {
        // Pair top half vs bottom half directly
        var combined=[];
        var pairs=Math.min(top.length,bot.length);
        for(var qi=0;qi+1<pairs;qi+=2){
          var g2=[top[qi],top[qi+1],bot[qi],bot[qi+1]];
          var ta=[g2[0],g2[1]],tb=[g2[2],g2[3]];
          m.push({t1:[ta[0].id,ta[1].id],t2:[tb[0].id,tb[1].id]});
        }
        // Fallback: if we got nothing (e.g. odd halves), use balanced
        if(!m.length) m=makePairs(grp,'balanced');
      }
    } else {
      grp=shuffle(grp);
      for(var i=0;i<grp.length-3;i+=4){
        var g=grp.slice(i,i+4);
        var t1a=[g[0],g[1]],t2a=[g[2],g[3]];
        var t1b=[g[0],g[2]],t2b=[g[1],g[3]];
        var t1c=[g[0],g[3]],t2c=[g[1],g[2]];
        function pr(t1,t2){var s=0;if(goodPair(t1[0],t1[1]))s++;if(goodPair(t2[0],t2[1]))s++;return s;}
        var best={t1:t1a,t2:t2a,s:pr(t1a,t2a)};
        if(pr(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:pr(t1b,t2b)};
        if(pr(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:pr(t1c,t2c)};
        m.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
      }
    }
    return m;
  }

  var grpSize=STATE.baneGroups||0;
  var rounds=STATE.rounds||1;
  var playersPerRound=Math.floor(ps.length/4)*4;
  var reserveCount=ps.length-playersPerRound;
  var allMatches=[];

  for(var r=0;r<rounds;r++){
    var roundPlayers, roundReserves=[];
    if(reserveCount>0){
      var sorted=ps.slice().sort(function(a,b){return a.id>b.id?1:-1;});
      var startIdx=(r*reserveCount)%ps.length;
      for(var i=0;i<reserveCount;i++) roundReserves.push(sorted[(startIdx+i)%ps.length]);
      roundPlayers=ps.filter(function(p){return roundReserves.indexOf(p)===-1;});
    } else {
      roundPlayers=shuffle(ps.slice());
    }
    var m=[];
    if(grpSize>=2&&roundPlayers.length>=grpSize*4){
      m=makePairs(roundPlayers.slice(0,grpSize*4),STATE.matchMode).concat(makePairs(roundPlayers.slice(grpSize*4),STATE.matchMode));
    } else {
      m=makePairs(roundPlayers,STATE.matchMode);
    }
    var resIds=roundReserves.map(function(p){return p.id;});
    for(var i=0;i<m.length;i++){m[i].round=r+1;m[i].reserveIds=resIds;}
    allMatches=allMatches.concat(m);
  }
  STATE.matches=allMatches;render();
};

window.parseImp=function(){
  var raw=(document.getElementById('ppPaste')||{}).value||'';
  if(!raw.trim()){STATE.irows=[];render();return;}
  var rows=raw.trim().split('\n');var parsed=[];
  var si=(rows[0]&&rows[0].split('\t')[0].toLowerCase()==='navn')?1:0;
  for(var i=si;i<rows.length;i++){
    var r=rows[i].split('\t');var nm=(r[0]||'').trim();if(!nm)continue;
    var lv=Math.min(5,Math.max(1,parseInt(r[1])||3));
    var sm={hojre:'hojre',right:'hojre',venstre:'venstre',left:'venstre',begge:'begge',both:'begge',alle:'begge','':'begge'};
    var sd=(r[2]||'').toLowerCase().trim().replace(/ø/g,'o');
    var errs=[];if(!nm)errs.push('Navn mangler');
    parsed.push({name:nm,level:lv,side:sm[sd]||'begge',notes:(r[3]||'').trim(),errs:errs});
  }
  STATE.irows=parsed;render();
  setTimeout(function(){var el=document.getElementById('ppPaste');if(el)el.value=raw;},0);
};

window.doImp=function(){
  var ok=STATE.irows.filter(function(p){return!p.errs.length;});
  if(!ok.length)return;
  Promise.all(ok.map(function(p){return sbPost('players',{club_id:clubId(),name:p.name,level:p.level,side:p.side,notes:p.notes});}))
  .then(function(){
    STATE.irows=[];STATE.showImp=false;
    loadPlayers().then(function(){render();setTimeout(function(){var el=document.getElementById('impOk');if(el){el.style.display='block';el.textContent='✓ '+ok.length+' spillere importeret!';}},50);});
  });
};

window.clrImp=function(){STATE.irows=[];render();setTimeout(function(){var el=document.getElementById('ppPaste');if(el)el.value='';},0);};

window.createUser=function(){
  var name=(document.getElementById('uN')||{}).value||'';
  var email=(document.getElementById('uE')||{}).value||'';
  var pw=(document.getElementById('uP')||{}).value||'';
  var clubName=(document.getElementById('uCN')||{}).value||'';
  var cid=(document.getElementById('uCI')||{}).value||'';
  var type=(document.getElementById('uT')||{}).value||'trainer';
  var exp=(document.getElementById('uExp')||{}).value||'';
  if(!email||!pw){alert('Email og password er påkrævet');return;}
  if(pw.length<6){alert('Password skal være mindst 6 tegn');return;}
  sbFetch('POST','/auth/v1/signup',{email:email,password:pw},null)
  .then(function(data){
    if(data.id||(data.user&&data.user.id)){
      var uid=data.id||data.user.id;
      // Use anon key directly to update profile (new user not logged in yet)
      return sbFetch('PATCH','/rest/v1/profiles?id=eq.'+uid,{
        name:name,
        role:type==='club'?'club_admin':'trainer',
        club_id:cid||email.split('@')[0].replace(/[^a-z0-9]/gi,'-'),
        club_name:clubName||name,
        subscription_type:type,
        subscription_expires:exp||'2099-12-31'
      }, SB_KEY);
    } else {
      alert('Fejl: '+(data.message||data.error_description||data.error||JSON.stringify(data)));
      return Promise.reject('failed');
    }
  }).then(function(){
    closeModal();
    alert('Bruger oprettet!\nLogin: '+email+'\nPassword: '+pw);
    loadAllProfiles().then(render);
  }).catch(function(e){if(e!=='failed')alert('Noget gik galt – prøv igen');});
};

window.renewUser=function(id){
  var months=prompt('Forny med hvor mange måneder?','6');
  if(!months)return;
  var m=parseInt(months)||6;
  var existing=STATE.allProfiles.filter(function(p){return p.id===id;})[0];
  var base=existing&&existing.subscription_expires&&new Date(existing.subscription_expires)>new Date()?new Date(existing.subscription_expires):new Date();
  base.setMonth(base.getMonth()+m);
  var newDate=base.toISOString().split('T')[0];
  sbPatch('profiles',{subscription_expires:newDate},'id=eq.'+id).then(function(){loadAllProfiles().then(render);});
};

window.deleteUser=function(id){
  if(!confirm('Deaktiver denne bruger?'))return;
  sbPatch('profiles',{subscription_expires:'2000-01-01'},'id=eq.'+id).then(function(){loadAllProfiles().then(render);});
};

window.makeMasterDrill=function(id){
  if(!id)return;
  if(!confirm('Gør denne øvelse til masterøvelse synlig for alle?'))return;
  sbPatch('drills',{from_master:true},'id=eq.'+id).then(function(){
    closeModal();loadDrills().then(render);
  });
};
window.unmasterDrill=function(id){
  if(!id)return;
  if(!confirm('Fjern masterøvelse-status? Øvelsen bliver ikke længere synlig for andre trænere.'))return;
  sbPatch('drills',{from_master:false},'id=eq.'+id).then(function(){
    closeModal();loadDrills().then(render);
  });
};
window.makeMaster=function(id){
  if(!confirm('Gør denne øvelse til masterøvelse synlig for alle?'))return;
  sbPatch('drills',{from_master:true},'id=eq.'+id).then(function(){
    loadDrills().then(render);
  });
};
window.toggleAll=function(){
  if(STATE.att.length===STATE.players.length){
    STATE.att=[];
  } else {
    STATE.att=STATE.players.map(function(p){return p.id;});
  }
  render();
};
window.toggleSession=function(id){STATE.openSession=STATE.openSession===id?null:id;render();};
window.deleteSession=function(id){if(!confirm('Slet denne træning?'))return;sbDelete('sessions','id=eq.'+id).then(function(){loadSessions().then(render);});};
window.promptSaveSession=function(){
  var name=prompt('Navn på træningen:','Uge '+getWeekNumber(new Date())+' – '+new Date().toLocaleDateString('da-DK',{weekday:'long'}));
  if(!name)return;
  // Store player names in matches for historical lookup
  var matchesWithNames=STATE.matches.map(function(m){
    return {
      t1:m.t1,t2:m.t2,round:m.round||1,
      p1name:getPlayerName(m.t1[0]),p2name:getPlayerName(m.t1[1]),
      p3name:getPlayerName(m.t2[0]),p4name:getPlayerName(m.t2[1])
    };
  });
  var data={
    club_id:clubId(),
    name:name,
    date:new Date().toISOString().split('T')[0],
    player_ids:STATE.att,
    matches:matchesWithNames,
    rounds:STATE.rounds||1
  };
  sbPost('sessions',data).then(function(result){
    console.log('Session post result:', JSON.stringify(result));
    if(result && !result.error && !result.code){
      loadSessions().then(function(){
        render();
        alert('Træning gemt under Historik!');
      });
    } else {
      alert('Fejl ved gemning: '+(result.message||result.error||result.code||JSON.stringify(result)));
    }
  }).catch(function(err){
    alert('Netværksfejl: '+err.message);
  });
};
function getWeekNumber(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));var y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7);}

loadSession();
render();
if(STATE.session&&STATE.session.access_token){
  loadProfile().then(function(){
    if(STATE.profile&&STATE.profile.id){loadAll();}
    else{STATE.session=null;localStorage.removeItem('pp_session');render();}
  }).catch(function(){STATE.session=null;localStorage.removeItem('pp_session');render();});
}
</script>
