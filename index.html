<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PurePadel Coach</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100vh;}
#app{max-width:920px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.08);}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;padding:20px;}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-sub{font-size:12px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-label{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.login-input{width:100%;padding:10px 14px;background:#f9f9f9;border:1.5px solid #e5e5e5;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:14px;}
.login-btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
.login-btn:hover{background:#333;}
.login-err{color:#c0392b;font-size:13px;margin-top:10px;text-align:center;}
.header{background:#0a0a0a;border-bottom:3px solid #fff;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo-coach{font-size:10px;font-weight:500;letter-spacing:3px;color:#888;text-transform:uppercase;line-height:1;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-user{font-size:12px;color:#888;}
.header-logout{font-size:11px;color:#888;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:none;border:none;font-family:'DM Sans',sans-serif;}
.header-logout:hover{color:#fff;}
.tabs{background:#1a1a1a;display:flex;padding:0 20px;}
.tab{padding:12px 14px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#666;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.tab.active{color:#fff;border-bottom-color:#fff;}
.tab:hover:not(.active){color:#aaa;}
.content{padding:20px;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;line-height:1;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-dark{background:#111;color:#fff;}.btn-dark:hover{background:#333;}
.btn-light{background:#f5f5f5;color:#555;border:1.5px solid #ddd;}
.btn-red{background:#fff0f0;color:#c0392b;border:1.5px solid #f5b7b1;}.btn-red:hover{background:#c0392b;color:#fff;}
.btn-green{background:#3ecf8e;color:#000;}
.btn-yellow{background:#fff3f3;color:#c0392b;border:1.5px solid #f5b7b1;}
.btn[disabled]{opacity:.3;cursor:not-allowed;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#111;}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;border:1.5px solid #ddd;color:#555;background:#fff;font-family:'DM Sans',sans-serif;}
.pill.active{background:#111;color:#fff;border-color:#111;}
.fg{margin-bottom:14px;}
.flabel{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.finput{width:100%;padding:9px 13px;background:#fff;border:1.5px solid #ddd;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px;}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#111;margin-bottom:6px;}
.modal-sub{font-size:12px;color:#aaa;margin-bottom:20px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:16px;border-top:1px solid #eee;margin-top:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:16px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#111;}
.stat-lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:6px;background:#fff;}
.user-role{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;border:1px solid;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px;color:#bbb;}
.pcard{display:flex;align-items:center;gap:14px;}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;border:1.5px solid;}
.ptag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;border:1px solid;}
.match-teams{display:grid;grid-template-columns:1fr 40px 1fr;gap:12px;align-items:center;}
.mp{display:flex;align-items:center;gap:8px;}
.mp.r{flex-direction:row-reverse;}
.mp-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;border:1.5px solid;flex-shrink:0;}
.att-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:8px;cursor:pointer;background:#fff;margin-bottom:6px;}
.att-row.on{border-color:#111;background:#f9f9f9;}
.att-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.att-row.on .att-chk{background:#111;border-color:#111;}
.paste-area{width:100%;min-height:80px;background:#fff;border:1.5px dashed #ccc;border-radius:8px;padding:10px;color:#111;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var SB_URL='https://fhpqetgfrfhecbbzxguz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZocHFldGdmcmZoZWNiYnp4Z3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM1MjUsImV4cCI6MjA5NTM1OTUyNX0.eiYZFR7cZEs2y7SM_82MvkJyA-afZ9N26COoBCGioAk';
var SHEET_ID='1QE-NBCS7OIlBzYYtr9vv1W5Qd4MNfuIJd6wdjG9AM04';
var CATS=[
  {id:'forsvar',label:'Forsvar',color:'#1d6fb5',bg:'#e8f0fb',border:'#b3cef0'},
  {id:'angreb',label:'Angreb',color:'#c0392b',bg:'#fdecea',border:'#f5b7b1'},
  {id:'overhead',label:'Overheads',color:'#7d3c98',bg:'#f5eef8',border:'#d7bde2'},
  {id:'volley',label:'Volley',color:'#1e8449',bg:'#eafaf1',border:'#a9dfbf'},
  {id:'grundslag',label:'Grundslag',color:'#d35400',bg:'#fef5ec',border:'#f5cba7'},
  {id:'serve',label:'Serv',color:'#1a5276',bg:'#eaf2f8',border:'#aed6f1'},
  {id:'taktik',label:'Taktik',color:'#6c3483',bg:'#f4ecf7',border:'#d2b4de'},
  {id:'opvarmning',label:'Opvarmning',color:'#b7770d',bg:'#fef9e7',border:'#f9e79f'}
];
var STATE={session:null,profile:null,tab:'drills',drills:[],sheetDrills:[],players:[],allProfiles:[],fcat:'alle',modal:null,editDrill:null,matches:[],att:[],matchMode:'balanced',ov:null,mvids:[],irows:[],showImp:false,loading:false};

function sbFetch(method,path,data,token){return new Promise(function(resolve,reject){var xhr=new XMLHttpRequest();xhr.open(method,SB_URL+path,true);xhr.setRequestHeader('apikey',SB_KEY);xhr.setRequestHeader('Authorization','Bearer '+(token||SB_KEY));xhr.setRequestHeader('Content-Type','application/json');if(method==='POST')xhr.setRequestHeader('Prefer','return=representation');xhr.onload=function(){try{resolve(JSON.parse(xhr.responseText));}catch(e){resolve({});}};xhr.onerror=function(){reject(new Error('Network error'));};xhr.send(data?JSON.stringify(data):null);});}
function sbGet(t,q){var tok=STATE.session?STATE.session.access_token:null;return sbFetch('GET','/rest/v1/'+t+'?'+q,null,tok);}
function sbPost(t,d){var tok=STATE.session?STATE.session.access_token:null;return sbFetch('POST','/rest/v1/'+t,d,tok);}
function sbPatch(t,d,q){var tok=STATE.session?STATE.session.access_token:null;return sbFetch('PATCH','/rest/v1/'+t+'?'+q,d,tok);}
function sbDelete(t,q){var tok=STATE.session?STATE.session.access_token:null;return sbFetch('DELETE','/rest/v1/'+t+'?'+q,null,tok);}
function sbAuth(email,pw){return new Promise(function(resolve){var xhr=new XMLHttpRequest();xhr.open('POST',SB_URL+'/auth/v1/token?grant_type=password',true);xhr.setRequestHeader('apikey',SB_KEY);xhr.setRequestHeader('Content-Type','application/json');xhr.onload=function(){try{resolve(JSON.parse(xhr.responseText));}catch(e){resolve({});}};xhr.onerror=function(){resolve({error:'network'});};xhr.send(JSON.stringify({email:email,password:pw}));});}

function saveSession(s){STATE.session=s;localStorage.setItem('pp_session',JSON.stringify(s));}
function loadSession(){try{var s=localStorage.getItem('pp_session');if(s)STATE.session=JSON.parse(s);}catch(e){}}
function logout(){STATE.session=null;STATE.profile=null;localStorage.removeItem('pp_session');render();}
function loadProfile(){if(!STATE.session)return Promise.resolve();return sbGet('profiles','id=eq.'+STATE.session.user.id).then(function(data){if(Array.isArray(data)&&data.length>0){STATE.profile=data[0];STATE.tab=STATE.profile.role==='superadmin'?'admin':'drills';sbPatch('profiles',{last_seen:new Date().toISOString()},'id=eq.'+STATE.session.user.id);}});}
function clubId(){if(!STATE.profile)return'purepadel';return STATE.profile.club_id||'purepadel';}
function loadPlayers(){var q=STATE.profile&&STATE.profile.role==='superadmin'?'order=name':'club_id=eq.'+clubId()+'&order=name';return sbGet('players',q).then(function(data){if(Array.isArray(data))STATE.players=data;});}
function loadDrills(){var q=STATE.profile&&STATE.profile.role==='superadmin'?'order=created_at':'club_id=eq.'+clubId()+'&order=created_at';return sbGet('drills',q).then(function(data){if(Array.isArray(data))STATE.drills=data;});}
function loadAllProfiles(){return sbGet('profiles','order=created_at').then(function(data){if(Array.isArray(data))STATE.allProfiles=data;});}
function loadSheet(){return new Promise(function(resolve){var xhr=new XMLHttpRequest();xhr.open('GET','https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv',true);xhr.onload=function(){if(xhr.status===200){var lines=xhr.responseText.trim().split('\n');if(lines.length<2){resolve();return;}var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase();});var drills=[];for(var i=1;i<lines.length;i++){var cols=[];var line=lines[i];var inQ=false;var cur='';for(var c=0;c<line.length;c++){if(line[c]==='"'){inQ=!inQ;}else if(line[c]===','&&!inQ){cols.push(cur);cur='';}else{cur+=line[c];}}cols.push(cur);var row={};for(var h=0;h<headers.length;h++)row[headers[h]]=(cols[h]||'').trim();var title=row.titel||row.title||'';if(!title)continue;var vurl=row.video_url||'';var videos=vurl?[{type:'link',title:title,url:vurl}]:[];drills.push({id:'sheet_'+i,title:title,cat:row.kategori||'grundslag',level:row.niveau||'Alle',players:parseInt(row.spillere)||2,description:row.beskrivelse||'',videos:videos,from_master:true});}STATE.sheetDrills=drills;}resolve();};xhr.onerror=function(){resolve();};xhr.send();});}
function allDrills(){return STATE.sheetDrills.concat(STATE.drills);}
function loadAll(){STATE.loading=true;render();var promises=[loadPlayers(),loadDrills(),loadSheet()];if(STATE.profile&&STATE.profile.role==='superadmin')promises.push(loadAllProfiles());Promise.all(promises).then(function(){STATE.loading=false;render();});}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gc(id){for(var i=0;i<CATS.length;i++)if(CATS[i].id===id)return CATS[i];return{label:id,color:'#555',bg:'#f5f5f5',border:'#ddd'};}
function stars(n){var s='';for(var i=0;i<5;i++)s+='<span style="color:'+(i<n?'#f5a623':'#ddd')+';font-size:12px;">'+(i<n?'&#9733;':'&#9734;')+'</span>';return s;}
function initials(name){var p=(name||'').split(' ');var s='';for(var i=0;i<Math.min(2,p.length);i++)if(p[i])s+=p[i][0];return s.toUpperCase();}
function acolor(id){var c=[{color:'#1d6fb5',border:'#b3cef0',bg:'#e8f0fb'},{color:'#1e8449',border:'#a9dfbf',bg:'#eafaf1'},{color:'#7d3c98',border:'#d7bde2',bg:'#f5eef8'},{color:'#c0392b',border:'#f5b7b1',bg:'#fdecea'},{color:'#b7770d',border:'#f9e79f',bg:'#fef9e7'}];var k=typeof id==='string'?id.charCodeAt(0):id;return c[Math.abs(k)%c.length];}
function sideInfo(s){if(s==='hojre'||s==='højre')return{label:'Højre',color:'#d35400',bg:'#fef5ec',border:'#f5cba7'};if(s==='venstre')return{label:'Venstre',color:'#1d6fb5',bg:'#e8f0fb',border:'#b3cef0'};return{label:'Begge',color:'#1e8449',bg:'#eafaf1',border:'#a9dfbf'};}
function ytid(url){var m=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^?&\s]{11})/);return m?m[1]:null;}
function formatDate(d){if(!d)return'–';return new Date(d).toLocaleDateString('da-DK');}
function daysLeft(d){if(!d)return 9999;try{var diff=new Date(d)-new Date();return Math.ceil(diff/86400000);}catch(e){return 9999;}}

function render(){
  var app=document.getElementById('app');if(!app)return;
  if(!STATE.session||!STATE.profile){app.innerHTML=rLogin();return;}
  var p=STATE.profile;
  if(p.role!=='superadmin'&&p.subscription_expires){var days=daysLeft(p.subscription_expires);if(days<0){app.innerHTML=rExpired();return;}}
  var tabs=[];
  if(p.role==='superadmin'){tabs=[{id:'admin',label:'Admin'},{id:'drills',label:'Øvelser'},{id:'players',label:'Spillere'},{id:'matches',label:'Kampopsætning'}];}
  else{tabs=[{id:'drills',label:'Øvelser'},{id:'players',label:'Spillere'},{id:'matches',label:'Kampopsætning'}];if(STATE.tab==='admin')STATE.tab='drills';}
  var html='';
  html+='<div class="header"><div style="display:flex;align-items:center;gap:10px;"><img src="https://i.imgur.com/placeholder.png" style="height:40px;display:none;"><div><div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px;color:#fff;line-height:1;">PUREPADEL</div><div class="logo-coach">Coach</div></div></div>';
  html+='<div class="header-right">';
  if(p.role!=='superadmin'&&p.subscription_expires){var dl=daysLeft(p.subscription_expires);if(dl<30&&dl>=0)html+='<span style="font-size:11px;color:'+(dl<7?'#c0392b':'#b7770d')+';">'+dl+' dage tilbage</span>';}
  html+='<span class="header-user">'+(p.name&&p.name!=='null'?p.name:p.email)+'</span><button class="header-logout" onclick="doLogout()">Log ud</button></div></div>';
  html+='<div class="tabs">';
  for(var i=0;i<tabs.length;i++){var t=tabs[i];html+='<span class="tab'+(STATE.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</span>';}
  html+='</div><div class="content">';
  if(STATE.loading){html+='<div style="text-align:center;padding:40px;color:#aaa;">Henter data...</div>';}
  else{if(STATE.tab==='admin'&&p.role==='superadmin')html+=rAdmin();else if(STATE.tab==='drills')html+=rDrills();else if(STATE.tab==='players')html+=rPlayers();else html+=rMatches();}
  html+='</div>';
  if(STATE.modal==='drill')html+=rDrillModal();
  else if(STATE.modal==='add_player')html+=rPlayerModal();
  else if(STATE.modal==='add_user')html+=rAddUserModal();
  app.innerHTML=html;
}

function rLogin(){
  return'<div class="login-wrap"><div class="login-box">'
    +'<div style="text-align:center;margin-bottom:24px;background:#000;border-radius:10px;padding:20px;"><div style="font-family:Bebas Neue,sans-serif;font-size:36px;letter-spacing:3px;color:#fff;">PUREPADEL</div><div style="font-size:11px;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:4px;">Coach Platform</div></div>'
    +'<label class="login-label">Email</label><input class="login-input" id="loginEmail" type="email" placeholder="din@email.dk">'
    +'<label class="login-label">Password</label><input class="login-input" id="loginPw" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doLogin()">'
    +'<button class="login-btn" onclick="doLogin()">Log ind</button>'
    +'<div class="login-err" id="loginErr"></div>'
    +'</div></div>';
}

function rExpired(){
  return'<div class="login-wrap"><div class="login-box"><div style="text-align:center;padding:20px 0;">'
    +'<div style="font-size:40px;margin-bottom:16px;">⏰</div>'
    +'<div style="font-size:18px;font-weight:600;color:#111;margin-bottom:8px;">Abonnement udløbet</div>'
    +'<div style="font-size:14px;color:#888;margin-bottom:24px;">Kontakt PurePadel for at forny</div>'
    +'<a href="mailto:dux9000@gmail.com" style="display:inline-block;padding:10px 20px;background:#111;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">Kontakt PurePadel</a>'
    +'</div><div style="text-align:center;margin-top:16px;"><button onclick="doLogout()" style="background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;">Log ud</button></div></div></div>';
}

function rAdmin(){
  var profiles=STATE.allProfiles;
  var active=profiles.filter(function(p){return p.role!=='superadmin'&&daysLeft(p.subscription_expires)>=0;});
  var expiring=active.filter(function(p){var d=daysLeft(p.subscription_expires);return d>=0&&d<30;});
  var expired=profiles.filter(function(p){return p.role!=='superadmin'&&daysLeft(p.subscription_expires)<0;});
  var html='<div class="sec-head"><div class="sec-title">Admin Board</div><button class="btn btn-dark" onclick="openModal(\'add_user\')">+ Opret bruger</button></div>';
  html+='<div class="stat-grid"><div class="stat-card"><div class="stat-num">'+active.length+'</div><div class="stat-lbl">Aktive</div></div><div class="stat-card"><div class="stat-num" style="color:#b7770d;">'+expiring.length+'</div><div class="stat-lbl">Udløber snart</div></div><div class="stat-card"><div class="stat-num" style="color:#c0392b;">'+expired.length+'</div><div class="stat-lbl">Udløbet</div></div></div>';
  if(profiles.length===0){html+='<div class="empty">Ingen brugere endnu</div>';}

window.clrMatches=function(){STATE.matches=[];render();};
window.rmVid=function(i){STATE.mvids.splice(i,1);render();};
window.editDrill=function(id){var all=allDrills();for(var i=0;i<all.length;i++)if(all[i].id===id){STATE.editDrill=all[i];break;}STATE.modal='drill';render();};
window.saveDrill=function(){var t=(document.getElementById('mT')||{}).value||'';if(!t.trim()){alert('Angiv en titel');return;}var vurl=(document.getElementById('mVU')||{}).value||'';var vtitle=(document.getElementById('mVN')||{}).value||'';var data={club_id:clubId(),title:t.trim(),cat:document.getElementById('mC').value,level:document.getElementById('mL').value,players:parseInt(document.getElementById('mP').value)||2,description:(document.getElementById('mD').value||'').trim(),video_url:vurl.trim()};var promise;if(STATE.editDrill&&STATE.editDrill.id&&!String(STATE.editDrill.id).startsWith('sheet_')){promise=sbPatch('drills',data,'id=eq.'+STATE.editDrill.id);}else{promise=sbPost('drills',data);}promise.then(function(){closeModal();loadDrills().then(render);});};
window.delDrill=function(id){if(!confirm('Slet øvelse?'))return;sbDelete('drills','id=eq.'+id).then(function(){loadDrills().then(render);});};
window.savePlayer=function(){var n=(document.getElementById('pN')||{}).value||'';if(!n.trim()){alert('Angiv et navn');return;}sbPost('players',{club_id:clubId(),name:n.trim(),level:Math.min(5,Math.max(1,parseInt(document.getElementById('pL').value)||3)),side:document.getElementById('pS').value,notes:(document.getElementById('pO').value||'').trim()}).then(function(){closeModal();loadPlayers().then(render);});};
window.delPlayer=function(id){if(!confirm('Slet spiller?'))return;sbDelete('players','id=eq.'+id).then(function(){STATE.att=STATE.att.filter(function(a){return a!==id;});loadPlayers().then(render);});};
window.genMatches=function(){if(STATE.att.length<4)return;var ps=[];for(var i=0;i<STATE.att.length;i++){for(var j=0;j<STATE.players.length;j++)if(STATE.players[j].id===STATE.att[i]){ps.push(STATE.players[j]);break;}}function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}var m=[];if(STATE.matchMode==='balanced'){ps.sort(function(a,b){return b.level-a.level;});for(var i=0;i<ps.length-3;i+=4){var g=ps.slice(i,i+4);m.push({t1:[g[0].id,g[3].id],t2:[g[1].id,g[2].id]});}}else if(STATE.matchMode==='split'){ps.sort(function(a,b){return b.level-a.level;});var half=Math.floor(ps.length/2);var top=shuffle(ps.slice(0,half));var bot=shuffle(ps.slice(half));for(var i=0;i<top.length-3;i+=4){var g=top.slice(i,i+4);m.push({t1:[g[0].id,g[1].id],t2:[g[2].id,g[3].id]});}for(var i=0;i<bot.length-3;i+=4){var g=bot.slice(i,i+4);m.push({t1:[g[0].id,g[1].id],t2:[g[2].id,g[3].id]});}}else{ps=shuffle(ps);for(var i=0;i<ps.length-3;i+=4){var g=ps.slice(i,i+4);m.push({t1:[g[0].id,g[1].id],t2:[g[2].id,g[3].id]});}}STATE.matches=m;render();};
window.parseImp=function(){var raw=(document.getElementById('ppPaste')||{}).value||'';if(!raw.trim()){STATE.irows=[];render();return;}var rows=raw.trim().split('\n');var parsed=[];var si=(rows[0]&&rows[0].split('\t')[0].toLowerCase()==='navn')?1:0;for(var i=si;i<rows.length;i++){var r=rows[i].split('\t');var nm=(r[0]||'').trim();if(!nm)continue;var lv=Math.min(5,Math.max(1,parseInt(r[1])||3));var sm={hojre:'hojre',right:'hojre',venstre:'venstre',left:'venstre',begge:'begge',both:'begge',alle:'begge','':'begge'};var sd=(r[2]||'').toLowerCase().trim().replace(/ø/g,'o');var errs=[];if(!nm)errs.push('Navn mangler');parsed.push({name:nm,level:lv,side:sm[sd]||'begge',notes:(r[3]||'').trim(),errs:errs});}STATE.irows=parsed;render();setTimeout(function(){var el=document.getElementById('ppPaste');if(el)el.value=raw;},0);};
window.doImp=function(){var ok=STATE.irows.filter(function(p){return!p.errs.length;});if(!ok.length)return;Promise.all(ok.map(function(p){return sbPost('players',{club_id:clubId(),name:p.name,level:p.level,side:p.side,notes:p.notes});})).then(function(){STATE.irows=[];STATE.showImp=false;loadPlayers().then(function(){render();setTimeout(function(){var el=document.getElementById('impOk');if(el){el.style.display='block';el.textContent='✓ '+ok.length+' spillere importeret!';}},50);});});};
window.clrImp=function(){STATE.irows=[];render();setTimeout(function(){var el=document.getElementById('ppPaste');if(el)el.value='';},0);};
window.createUser=function(){var name=(document.getElementById('uN')||{}).value||'';var email=(document.getElementById('uE')||{}).value||'';var pw=(document.getElementById('uP')||{}).value||'';var clubName=(document.getElementById('uCN')||{}).value||'';var cid=(document.getElementById('uCI')||{}).value||'';var type=(document.getElementById('uT')||{}).value||'trainer';var exp=(document.getElementById('uExp')||{}).value||'';if(!email||!pw){alert('Email og password er påkrævet');return;}if(pw.length<6){alert('Password skal være mindst 6 tegn');return;}sbFetch('POST','/auth/v1/signup',{email:email,password:pw},null).then(function(data){if(data.id||(data.user&&data.user.id)){var uid=data.id||data.user.id;return sbPatch('profiles',{name:name,role:type==='club'?'club_admin':'trainer',club_id:cid||email.split('@')[0].replace(/[^a-z0-9]/gi,'-'),club_name:clubName||name,subscription_type:type,subscription_expires:exp||'2099-12-31'},'id=eq.'+uid);}else{alert('Fejl: '+(data.message||data.error_description||data.error||JSON.stringify(data)));return Promise.reject('failed');}}).then(function(){closeModal();alert('Bruger oprettet!\nLogin: '+email+'\nPassword: '+pw);loadAllProfiles().then(render);}).catch(function(e){if(e!=='failed')alert('Noget gik galt – prøv igen');});};
window.renewUser=function(id){var months=prompt('Forny med hvor mange måneder?','6');if(!months)return;var m=parseInt(months)||6;var existing=STATE.allProfiles.filter(function(p){return p.id===id;})[0];var base=existing&&existing.subscription_expires&&new Date(existing.subscription_expires)>new Date()?new Date(existing.subscription_expires):new Date();base.setMonth(base.getMonth()+m);var newDate=base.toISOString().split('T')[0];sbPatch('profiles',{subscription_expires:newDate},'id=eq.'+id).then(function(){loadAllProfiles().then(render);});};
window.deleteUser=function(id){if(!confirm('Deaktiver denne bruger?'))return;sbPatch('profiles',{subscription_expires:'2000-01-01'},'id=eq.'+id).then(function(){loadAllProfiles().then(render);});};

loadSession();
render();
if(STATE.session&&STATE.session.access_token){loadProfile().then(function(){if(STATE.profile&&STATE.profile.id){loadAll();}else{STATE.session=null;localStorage.removeItem('pp_session');render();}}).catch(function(){STATE.session=null;localStorage.removeItem('pp_session');render();});}
</script>
