*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100vh;}
#app{max-width:920px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.08);}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;padding:20px;}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#111;margin-bottom:4px;}
.login-sub{font-size:12px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-label{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.login-input{width:100%;padding:10px 14px;background:#f9f9f9;border:1.5px solid #e5e5e5;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:14px;transition:border-color .15s;}
.login-input:focus{border-color:#111;}
.login-btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
.login-btn:hover{background:#333;}
.login-err{color:#c0392b;font-size:13px;margin-top:10px;text-align:center;}

/* HEADER */
.header{background:#0a0a0a;border-bottom:3px solid #fff;padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;min-width:0;overflow:hidden;}
.logo{display:flex;align-items:baseline;flex-shrink:0;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;line-height:1;}
.logo-coach{font-size:10px;font-weight:500;letter-spacing:3px;color:#888;text-transform:uppercase;margin-left:10px;padding-left:10px;border-left:1px solid #444;line-height:1;}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.header-user{font-size:12px;color:#888;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.header-logout{font-size:11px;color:#888;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:none;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.header-logout:hover{color:#fff;}
@media(max-width:600px){
  .header{padding:0 10px;height:50px;}
  .header-user{display:none;}
  .logo-coach{display:none;}
  .header-img{height:34px!important;}
  .logo-text-wrap{display:none;}
}

/* TABS */
.tabs{background:#1a1a1a;display:flex;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap;flex-wrap:nowrap;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 12px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:#666;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:color .15s,border-color .15s;flex-shrink:0;}
.tab.active{color:#fff;border-bottom-color:#fff;}
.tab:hover:not(.active){color:#aaa;}

/* CONTENT */
.content{padding:20px;}

/* CARDS */
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;line-height:1;transition:all .15s;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-dark{background:#111;color:#fff;}.btn-dark:hover{background:#333;}
.btn-light{background:#f5f5f5;color:#555;border:1.5px solid #ddd;}.btn-light:hover{background:#e0e0e0;}
.btn-red{background:#fff0f0;color:#c0392b;border:1.5px solid #f5b7b1;}.btn-red:hover{background:#c0392b;color:#fff;}
.btn-green{background:#3ecf8e;color:#000;}.btn-green:hover{background:#2fb87a;}
.btn-yellow{background:#fff3f3;color:#c0392b;border:1.5px solid #f5b7b1;}
.btn[disabled]{opacity:.3;cursor:not-allowed;}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#111;}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;border:1.5px solid #ddd;color:#555;background:#fff;font-family:'DM Sans',sans-serif;transition:all .15s;}
.pill.active{background:#111;color:#fff;border-color:#111;}

/* FORM */
.fg{margin-bottom:14px;}
.flabel{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.finput{width:100%;padding:9px 13px;background:#fff;border:1.5px solid #ddd;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.finput:focus{border-color:#111;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px;}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#111;margin-bottom:6px;}
.modal-sub{font-size:12px;color:#aaa;margin-bottom:20px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:16px;border-top:1px solid #eee;margin-top:20px;}

/* ADMIN */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:16px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#111;}
.stat-lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:6px;background:#fff;}
.user-role{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;border:1px solid;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px;color:#bbb;}

/* PLAYERS */
.pcard{display:flex;align-items:center;gap:14px;}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;border:1.5px solid;}
.ptag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;border:1px solid;}

/* MATCHES */
.match-teams{display:grid;grid-template-columns:1fr 40px 1fr;gap:12px;align-items:center;}
.mp{display:flex;align-items:center;gap:8px;}
.mp.r{flex-direction:row-reverse;}
.mp-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;border:1.5px solid;flex-shrink:0;}

/* ATT */
.att-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:8px;cursor:pointer;background:#fff;margin-bottom:6px;transition:all .12s;}
.att-row.on{border-color:#111;background:#f9f9f9;}
.att-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.att-row.on .att-chk{background:#111;border-color:#111;}

/* IMPORT */
.paste-area{width:100%;min-height:80px;background:#fff;border:1.5px dashed #ccc;border-radius:8px;padding:10px;color:#111;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;}

/* In-app toast notifikation */
#pp-toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #111;
  color: #fff;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  max-width: 320px;
  width: calc(100% - 32px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  text-align: center;
}
#pp-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
  cursor: pointer;
}
</style>

function createAuthUser(email,pw,name,role,clubId,playerId,callback){
  var tok=STATE.session?STATE.session.access_token:null;
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/functions/v1/create-user',true);
  xhr.setRequestHeader('Content-Type','application/json');

function genUUID(){
  var d=new Date().getTime();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=(d+Math.random()*16)%16|0;d=Math.floor(d/16);
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

// ── SUPABASE ─────────────────────────────────────────────────
function sbFetch(method, path, data, token) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, SB_URL + path, true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + (token || SB_KEY));
    xhr.setRequestHeader('Content-Type', 'application/json');
    if(method==='POST') xhr.setRequestHeader('Prefer','return=representation');
    xhr.onload = function(){
      try{resolve(JSON.parse(xhr.responseText));}catch(e){resolve({});}
    };
    xhr.onerror = function(){reject(new Error('Network error'));};
    xhr.send(data?JSON.stringify(data):null);
  });
}

function sbGet(table, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('GET', '/rest/v1/'+table+'?'+query, null, tok);
}
function sbPost(table, data) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('POST', '/rest/v1/'+table, data, tok);
}
function sbPatch(table, data, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('PATCH', '/rest/v1/'+table+'?'+query, data, tok);
}
function sbDelete(table, query) {
  var tok = STATE.session ? STATE.session.access_token : null;
  return sbFetch('DELETE', '/rest/v1/'+table+'?'+query, null, tok);
}

function sbAuth(email, password) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SB_URL + '/auth/v1/token?grant_type=password', true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function(){
      try{
        var data = JSON.parse(xhr.responseText);
        resolve(data);
      }catch(e){resolve({});}
    };
    xhr.onerror = function(){resolve({error:'network'});};
    xhr.send(JSON.stringify({email:email,password:password}));
  });
}

function sbSignup(email, password) {
  return new Promise(function(resolve) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SB_URL + '/auth/v1/signup', true);
    xhr.setRequestHeader('apikey', SB_KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function(){try{resolve(JSON.parse(xhr.responseText));}catch(e){resolve({});}};
    xhr.onerror = function(){resolve({error:'network'});};
    xhr.send(JSON.stringify({email:email,password:password}));
  });
}

// ── AUTH ─────────────────────────────────────────────────────
function saveSession(session) {
  STATE.session = session;
  localStorage.setItem('pp_session', JSON.stringify(session));
}

function loadSession() {
  try {
    var s = localStorage.getItem('pp_session');
    if(s) STATE.session = JSON.parse(s);
  } catch(e) {}
}

function logout() {
  STATE.session = null;
  STATE.profile = null;
  localStorage.removeItem('pp_session');
  render();
}

function loadProfile() {
  if(!STATE.session) return Promise.resolve();
  return sbGet('profiles', 'id=eq.'+STATE.session.user.id).then(function(data) {
    if(Array.isArray(data) && data.length > 0) {
      STATE.profile = data[0];
      if(STATE.profile.role === 'superadmin') {
        STATE.tab = 'admin';
      } else if(STATE.profile.role === 'player') {
        STATE.tab = 'player_home';
      } else {
        STATE.tab = 'drills';
      }
      // Restore last active tab if available
      try{
        var saved=localStorage.getItem('pp_tab');
        if(saved){
          // Superadmin: tillad alle faner inkl. admin
          // Andre: aldrig admin-fanen
          if(STATE.profile.role==='superadmin'){
            STATE.tab=saved;
          } else if(saved!=='admin'){
            STATE.tab=saved;
          }
        }
      }catch(e){}
      // Request push permission and subscribe
      setTimeout(subscribeToPush, 2000);
      sbPatch('profiles', {last_seen: new Date().toISOString()}, 'id=eq.'+STATE.session.user.id);
    }
  });
}

function loadSheet() {
  return new Promise(function(resolve) {
    var done=false;
    var timer=setTimeout(function(){if(!done){done=true;resolve();}},5000);
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv', true);
    xhr.onload = function() {
      if(done)return; done=true; clearTimeout(timer);
      if(xhr.status===200) {
        var lines=xhr.responseText.trim().split('\n');
        if(lines.length<2){resolve();return;}
        var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase();});
        var drills=[];
        for(var i=1;i<lines.length;i++){
          var cols=[];var line=lines[i];var inQ=false;var cur='';
          for(var c=0;c<line.length;c++){if(line[c]==='"'){inQ=!inQ;}else if(line[c]===','&&!inQ){cols.push(cur);cur='';}else{cur+=line[c];}}
          cols.push(cur);
          var row={};for(var h=0;h<headers.length;h++)row[headers[h]]=(cols[h]||'').trim();
          var title=row.titel||row.title||'';if(!title)continue;
          var vurl=row.video_url||'';
          var videos=vurl?[{type:'link',title:title,url:vurl}]:[];
          drills.push({id:'sheet_'+i,title:title,cat:row.kategori||'grundslag',level:row.niveau||'Alle',players:parseInt(row.spillere)||2,description:row.beskrivelse||'',videos:videos,from_master:true});
        }
        STATE.sheetDrills=drills;
      }
      resolve();
    };
    xhr.onerror=function(){if(!done){done=true;clearTimeout(timer);resolve();}};
    xhr.send();
  });
}

function allDrills() { return STATE.sheetDrills.concat(STATE.drills); }

function loadAll() {
  STATE.loading = true; render();
  var role = STATE.profile ? STATE.profile.role : '';

  if(role === 'player') {
    loadPlayerData().then(function(){
      STATE.loading = false; render();
    }).catch(function(){STATE.loading = false; render();});
    return;
  }

  var promises = [loadPlayers(), loadDrills(), loadSheet(), loadSessions()];
  if(role === 'superadmin'||role === 'club_admin') promises.push(loadAllProfiles());
  Promise.all(promises).then(function(){
    return loadTeams();
  }).then(function(){
    return loadEvents();
  }).then(function(){
    return loadEventResponses();
  }).then(function(){
    return loadTeamMembersCache();
  }).then(function(){
    var cid=STATE.profile&&STATE.profile.club_id;
    if(cid&&STATE.profile.role==='trainer'){
      return sbGet('profiles','id=eq.'+cid).then(function(data){
        if(Array.isArray(data)&&data.length)STATE.clubProfile=data[0];
      }).catch(function(){});
    }
    return Promise.resolve();
  }).then(function(){
    // Also load player data if trainer has is_player flag
    if(STATE.profile&&STATE.profile.is_player){
      return loadPlayerData();
    }
    return Promise.resolve();
  }).then(function(){
    STATE.loading = false;
    if(STATE.pendingOpenEvent){
      STATE.openEvent=STATE.pendingOpenEvent;
      STATE.tab='hold';
      STATE.pendingOpenEvent=null;
    }
    render();
  }).catch(function(err){
    console.error('loadAll fejl:', err);
    STATE.loading = false; render();
  });
}
// ── HELPERS ──────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gc(id){for(var i=0;i<CATS.length;i++)if(CATS[i].id===id)return CATS[i];return{label:id,color:'#555',bg:'#f5f5f5',border:'#ddd'};}
function stars(n){var s='';for(var i=0;i<5;i++)s+='<span style="color:'+(i<n?'#f5a623':'#ddd')+';font-size:12px;">'+(i<n?'&#9733;':'&#9734;')+'</span>';return s;}
function initials(name){var p=(name||'').split(' ');var s='';for(var i=0;i<Math.min(2,p.length);i++)if(p[i])s+=p[i][0];return s.toUpperCase();}
function acolor(id){var c=[{color:'#1d6fb5',border:'#b3cef0',bg:'#e8f0fb'},{color:'#1e8449',border:'#a9dfbf',bg:'#eafaf1'},{color:'#7d3c98',border:'#d7bde2',bg:'#f5eef8'},{color:'#c0392b',border:'#f5b7b1',bg:'#fdecea'},{color:'#b7770d',border:'#f9e79f',bg:'#fef9e7'}];var k=typeof id==='string'?id.charCodeAt(0):id;return c[Math.abs(k)%c.length];}
function sideInfo(s){if(s==='hojre'||s==='højre')return{label:'Højre',color:'#d35400',bg:'#fef5ec',border:'#f5cba7'};if(s==='venstre')return{label:'Venstre',color:'#1d6fb5',bg:'#e8f0fb',border:'#b3cef0'};return{label:'Begge',color:'#1e8449',bg:'#eafaf1',border:'#a9dfbf'};}
function ytid(url){var m=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^?&\s]{11})/);return m?m[1]:null;}
function formatDate(d){if(!d)return'\u2013';return new Date(d).toLocaleDateString('da-DK',{day:'numeric',month:'numeric',year:'numeric'});}
function daysLeft(d){if(!d)return 9999;try{var diff=new Date(d)-new Date();return Math.ceil(diff/86400000);}catch(e){return 9999;}}

function render() {
  var app = document.getElementById('app');
  if(!app) return;

  // Not logged in
  if(!STATE.session || !STATE.profile) {
    app.innerHTML = rLogin();
    return;
  }

  var p = STATE.profile;

  // Player role - completely different UI
  if(p.role === 'player') {
    if(p.status === 'pending') {
      app.innerHTML = rPlayerPending();
    } else if(p.status === 'rejected') {
      app.innerHTML = rPlayerRejected();
    } else {
      app.innerHTML = rPlayerApp();
    }
    return;

    trainerLogo=p.logo_url||(STATE.clubProfile&&STATE.clubProfile.logo_url)||null;
  }
  if(trainerLogo){
    html += '<img src="'+trainerLogo+'" style="height:36px;max-width:120px;object-fit:contain;margin-left:10px;" onerror="this.style.display=\'none\'">';
  }
  html += '<div class="header-right">';
  if(p.role !== 'superadmin' && p.subscription_expires) {
    var dl = daysLeft(p.subscription_expires);
    if(dl < 30 && dl >= 0) html += '<span style="font-size:11px;color:'+(dl<7?'#c0392b':'#b7770d')+';">'+dl+' dage tilbage</span>';
  }
  html += '<span class="header-user">'+(p.name||p.email)+'</span>';
  html += '<button class="header-logout" onclick="doLogout()">Log ud</button>';
  html += '</div></div>';

  // Tabs
  html += '<div class="tabs">';
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    html += '<span class="tab'+(STATE.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</span>';
  }
  html += '</div>';

  // Content
  html += '<div class="content">';
  if(STATE.loading) {
    html += '<div style="text-align:center;padding:40px;color:#aaa;">Henter data...</div>';
  } else {
    if(STATE.tab==='admin' && p.role==='superadmin') html += rAdmin();
    else if(STATE.tab==='admin') { STATE.tab='drills'; html += rDrills(); }
    else if(STATE.tab==='drills') html += rDrills();
    else if(STATE.tab==='players') html += rPlayers();
    else if(STATE.tab==='matches') html += rMatches();
    else if(STATE.tab==='hold') html += rHold();
    else if(STATE.tab==='mine_traening') html += rMineTraening();
    else if(STATE.tab==='historik') html += rHistorik();
    else if(STATE.tab==='konto') html += rKonto();
    else html += rMatches();
  }
  html += '</div>';

  // Modal
  if(STATE.modal==='drill') html += rDrillModal();
  else if(STATE.modal==='add_player') html += rPlayerModal();
  else if(STATE.modal==='edit_player') html += rEditPlayerModal();
  else if(STATE.modal==='add_user') html += rAddUserModal();
  else if(STATE.modal==='edit_team') html += rTeamModal();
  else if(STATE.modal==='edit_event') html += rEventModal();
  else if(STATE.modal==='edit_user') html += rEditUserModal();
  else if(STATE.modal==='add_login') html += rAddLoginModal();

  app.innerHTML = html;
}

// ── ADMIN BOARD ──────────────────────────────────────────────
function rAdmin() {
  var profiles = STATE.allProfiles;
  var trainersAndClubs = profiles.filter(function(p){return p.role==='trainer'||p.role==='club_admin';});
  var active = trainersAndClubs.filter(function(p){return p.subscription_expires&&daysLeft(p.subscription_expires)>=0;});
  var expiring = active.filter(function(p){var d=daysLeft(p.subscription_expires);return d>=0&&d<30;});
  var expired = trainersAndClubs.filter(function(p){return !p.subscription_expires||daysLeft(p.subscription_expires)<0;});
  var players = profiles.filter(function(p){return p.role==='player'&&p.status==='active';});

  var adminTab=STATE.adminSubTab||'foreninger';
  var html = '<div class="sec-head"><div class="sec-title">Admin Board</div>'
    +'<button class="btn btn-dark" onclick="openModal(\'add_user\')">+ Opret bruger</button></div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:16px;">';
  html+='<button onclick="STATE.adminSubTab=\'foreninger\';render()" style="padding:7px 16px;border-radius:8px;border:1.5px solid '+(adminTab==='foreninger'?'#111':'#ddd')+';background:'+(adminTab==='foreninger'?'#111':'#fff')+';color:'+(adminTab==='foreninger'?'#fff':'#666')+';font-size:13px;font-weight:600;cursor:pointer;">Foreninger &amp; Trænere</button>';
  html+='<button onclick="STATE.adminSubTab=\'spillere\';render()" style="padding:7px 16px;border-radius:8px;border:1.5px solid '+(adminTab==='spillere'?'#111':'#ddd')+';background:'+(adminTab==='spillere'?'#111':'#fff')+';color:'+(adminTab==='spillere'?'#fff':'#666')+';font-size:13px;font-weight:600;cursor:pointer;">Spillere ('+profiles.filter(function(p){return p.role==='player';}).length+')</button>';
  html+='</div>';

  // Stats
  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num">'+active.length+'</div><div class="stat-lbl">Aktive trænere/foreninger</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#b7770d;">'+expiring.length+'</div><div class="stat-lbl">Udl\u00f8ber inden 30 dage</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#c0392b;">'+expired.length+'</div><div class="stat-lbl">Udl\u00f8bet abonnement</div></div>';
  html += '</div>';
  html += '<div class="stat-grid" style="margin-top:-8px;">';
  html += '<div class="stat-card"><div class="stat-num" style="color:#1e8449;">'+players.length+'</div><div class="stat-lbl">Aktive spillere</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#888;">'+profiles.filter(function(p){return p.role==='player'&&p.status==='pending';}).length+'</div><div class="stat-lbl">Afventende spillere</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:#888;">'+profiles.filter(function(p){return p.role==='player';}).length+'</div><div class="stat-lbl">Spillere i alt</div></div>';
  html += '</div>';

function rDrills() {
  var list=allDrills();
  var filtered=STATE.fcat==='alle'?list:list.filter(function(d){return d.cat===STATE.fcat;});
  var cnt={};for(var i=0;i<list.length;i++)cnt[list[i].cat]=(cnt[list[i].cat]||0)+1;

  var html='<div class="sec-head"><div class="sec-title">Øvelsesbibliotek</div>'
    +'<button class="btn btn-dark" onclick="openAdd()">+ Ny øvelse</button></div>';

  html+='<div class="pills"><span class="pill'+(STATE.fcat==='alle'?' active':'')+'" onclick="setFcat(\'alle\')">Alle '+list.length+'</span>';
  for(var ci=0;ci<CATS.length;ci++){var c=CATS[ci];html+='<span class="pill'+(STATE.fcat===c.id?' active':'')+'" onclick="setFcat(\''+c.id+'\')">'+c.label+(cnt[c.id]?' '+cnt[c.id]:'')+' </span>';}
  html+='</div>';

  if(filtered.length===0){return html+'<div class="empty">Ingen øvelser</div>';}

  for(var di=0;di<filtered.length;di++){
    var d=filtered[di];var cat=gc(d.cat);var open=STATE.ov===d.id;
    var vs=d.videos||[];var desc=d.description||d.desc||'';
    html+='<div class="card">';
    html+='<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;">';
    html+='<div>';
    html+='<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;border:1px solid;color:'+cat.color+';background:'+cat.bg+';border-color:'+cat.border+';">'+cat.label+'</span>';
    if(d.from_master) html+='<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;margin-left:5px;border:1px solid;color:#1e8449;background:#eafaf1;border-color:#a9dfbf;">Master</span>';
    html+='<div style="font-size:15px;font-weight:600;color:#111;margin-bottom:4px;">'+esc(d.title)+'</div>';
    html+='<div style="font-size:13px;color:#666;line-height:1.5;">'+esc(desc)+'</div>';
    html+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">';
    html+='<span style="font-size:11px;color:#888;background:#f5f5f5;border:1px solid #eee;border-radius:4px;padding:2px 8px;">'+d.level+'</span>';
    html+='<span style="font-size:11px;color:#888;background:#f5f5f5;border:1px solid #eee;border-radius:4px;padding:2px 8px;">'+d.players+' '+(d.players>1?'spillere':'spiller')+'</span>';
    if(vs.length) html+='<span style="font-size:11px;color:#888;background:#f5f5f5;border:1px solid #eee;border-radius:4px;padding:2px 8px;">'+vs.length+' video'+(vs.length>1?'er':'')+'</span>';
    html+='</div></div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">';
    if(vs.length) html+='<button class="btn btn-yellow btn-sm" onclick="toggleVid(\''+d.id+'\')">Video</button>';
    if(STATE.profile&&STATE.profile.role==='superadmin'){
      html+='<button title="Administrer øvelse" style="background:none;border:1.5px solid #ddd;border-radius:6px;padding:5px 8px;cursor:pointer;color:#888;font-size:14px;line-height:1;" onclick="editDrill(\''+d.id+'\')">&#9881;</button>';
    } else if(!d.from_master){
      html+='<button class="btn btn-light btn-sm" onclick="editDrill(\''+d.id+'\')">Rediger</button>';
      html+='<button class="btn btn-red btn-sm" onclick="delDrill(\''+d.id+'\')">Slet</button>';
    }
    html+='</div></div>';
    if(open&&vs.length){
      html+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid #eee;">';
      for(var vi=0;vi<vs.length;vi++) html+=vitem(vs[vi],vi,false);
      html+='<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(d.title+' padel drill')+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #eee;width:100%;color:#c0392b;font-size:12px;font-weight:600;text-transform:uppercase;text-decoration:none;">Søg flere på YouTube</a>';
      html+='</div>';
    }
    html+='</div>';
  }
  return html;
}

function vitem(v,idx,ed){
  var id=ytid(v.url||'');
  var thumb=id?'<img src="https://img.youtube.com/vi/'+id+'/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\'">':'YT';
  var tbox='<div style="width:48px;height:34px;background:#ffe5e5;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #ffcccc;overflow:hidden;font-size:10px;color:#c0392b;">'+thumb+'</div>';
  if(ed) return'<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#f9f9f9;border-radius:8px;border:1px solid #eee;margin-bottom:6px;">'+tbox+'<span style="flex:1;font-size:12px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(v.title||v.url)+'</span><button class="btn btn-red btn-sm" onclick="rmVid('+idx+')">X</button></div>';
  return'<a href="'+v.url+'" target="_blank" style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f9f9f9;border:1px solid #eee;border-radius:8px;text-decoration:none;color:#111;margin-bottom:6px;">'+tbox+'<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(v.title||v.url)+'</div><div style="font-size:11px;color:#aaa;margin-top:2px;">YouTube</div></div><span style="color:#aaa;">&#8599;</span></a>';
}

  if(STATE.matches.length) html+='<button class="btn btn-light" onclick="clrMatches()">Ryd</button>';

        for(var ti=0;ti<tm1.length;ti++){var tp=tm1[ti].p;var tpar=tm1[ti].partner;var ta=acolor(tp.id);var ws=tw1&&tp.side!=='begge'&&tpar.side!=='begge'&&tp.side===tpar.side;html+='<div class="mp"><div class="mp-av" style="color:'+ta.color+';background:'+ta.bg+';border-color:'+ta.border+';">'+initials(tp.name)+'</div><div><div style="font-size:13px;font-weight:600;color:#111;">'+esc(tp.name)+(ws?' <span style="color:#d35400;font-size:11px;" title="Spiller på ikke-foretrukken side">⚠</span>':'')+'</div><div style="font-size:11px;color:#aaa;">'+('★'.repeat(tp.level))+(ws?' · <span style="color:#d35400;">foretrækker højre side</span>':'')+'</div></div></div>';}

        var tm2=[{p:p3,partner:p4},{p:p4,partner:p3}];
        for(var ti2=0;ti2<tm2.length;ti2++){var tp2=tm2[ti2].p;var tpar2=tm2[ti2].partner;var ta2=acolor(tp2.id);var ws2=tw2&&tp2.side!=='begge'&&tpar2.side!=='begge'&&tp2.side===tpar2.side;html+='<div class="mp r"><div class="mp-av" style="color:'+ta2.color+';background:'+ta2.bg+';border-color:'+ta2.border+';">'+initials(tp2.name)+'</div><div style="text-align:right;"><div style="font-size:13px;font-weight:600;color:#111;">'+(ws2?'<span style="color:#d35400;font-size:11px;">⚠</span> ':'')+esc(tp2.name)+'</div><div style="font-size:11px;color:#aaa;">'+(ws2?'<span style="color:#d35400;">foretrækker venstre side</span> · ':'')+''+('★'.repeat(tp2.level))+'</div></div></div>';}
        html+='</div></div>';
        html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;"><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Hold 1: '+pct+'% · Hold 2: '+(100-pct)+'%</div><div style="height:4px;background:#eee;border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+sc+';border-radius:2px;"></div></div></div>';
        html+='</div>';
      }
      // Single round coach
      var coachIds=STATE.matches.length>0&&STATE.matches[0].reserveIds?STATE.matches[0].reserveIds:[];

        html+='<div class="card" style="background:#fef9e7;border-color:#f9e79f;">';

    }
      // Legend if any wrong side placements
    var hasWrongSide=false;
    for(var wi=0;wi<STATE.matches.length;wi++){
      var wm=STATE.matches[wi];

  // Attendees

    html+='<option value="0" '+(STATE.baneGroups===0?'selected':'')+'>Ingen opdeling</option>';

    html+='</select></div>';
  }

  html+='<div class="card">';
  var allChecked=STATE.att.length===STATE.players.length&&STATE.players.length>0;
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';

    html+='</div>';
  }
  if(STATE.att.length<4) html+='<div style="font-size:13px;color:#888;margin-top:8px;">Vælg mindst 4 spillere</div>';
  html+='</div>';
  return html;
}

function rHistorik(){
  var html='<div class="sec-head"><div class="sec-title">Historik</div></div>';
  if(STATE.sessions.length===0){
    html+='<div class="empty">Ingen gemte træninger endnu<br><br><small style="color:#bbb;">Gem en træning fra Kampopsætning</small></div>';
    return html;
  }
  for(var si=0;si<STATE.sessions.length;si++){
    var s=STATE.sessions[si];
    var matches=s.matches||[];
    var playerIds=s.player_ids||[];
    var rounds=s.rounds||1;
    html+='<div class="card" style="margin-bottom:8px;">';
    html+='<div style="display:flex;align-items:start;justify-content:space-between;gap:12px;">';
    html+='<div style="flex:1;">';
    html+='<div style="font-size:15px;font-weight:600;color:#111;margin-bottom:4px;">'+esc(s.name)+'</div>';
    html+='<div style="font-size:12px;color:#888;">'+formatDate(s.date)+' · '+playerIds.length+' spillere · '+matches.length+' kampe'+(rounds>1?' · '+rounds+' runder':'')+'</div>';
    html+='</div>';
    html+='<button onclick="deleteSession(this.dataset.id)" data-id="'+s.id+'" style="background:#fff0f0;color:#c0392b;border:1.5px solid #f5b7b1;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;flex-shrink:0;">Slet</button>';
    html+='</div>';

    // Show matches collapsed - click to expand
    html+='<div onclick="toggleSession(this.dataset.id)" data-id="'+s.id+'" style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;cursor:pointer;display:flex;align-items:center;justify-content:space-between;">';
    html+='<span style="font-size:12px;color:#888;font-weight:600;letter-spacing:.5px;text-transform:uppercase;">Vis kampe</span>';
    html+='<span style="font-size:12px;color:#aaa;">'+(STATE.openSession===s.id?'▲':'▼')+'</span>';
    html+='</div>';

    if(STATE.openSession===s.id){
      html+='<div style="margin-top:10px;">';
      var baneCount=Math.ceil(matches.length/rounds);

      if(rounds>1){
        // Group by round
        var roundGroups={};
        for(var mi=0;mi<matches.length;mi++){
          var m=matches[mi];
          var rnd=m.round||Math.floor(mi/baneCount)+1;
          if(!roundGroups[rnd])roundGroups[rnd]=[];
          roundGroups[rnd].push(m);
        }
        for(var rnd=1;rnd<=rounds;rnd++){
          var rMatches=roundGroups[rnd]||[];
          html+='<div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;">Runde '+rnd+'</div>';
          for(var mi=0;mi<rMatches.length;mi++){
            var m=rMatches[mi];
            var p1n=m.p1name||getPlayerName(m.t1[0]);
            var p2n=m.p2name||getPlayerName(m.t1[1]);
            var p3n=m.p3name||getPlayerName(m.t2[0]);
            var p4n=m.p4name||getPlayerName(m.t2[1]);
            html+='<div style="padding:8px 10px;background:#f9f9f9;border-radius:6px;margin-bottom:6px;font-size:13px;">';
            html+='<span style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">Bane '+(mi+1)+'</span>';
            html+='<span style="color:#1d6fb5;font-weight:600;">'+esc(p1n)+' / '+esc(p2n)+'</span>';
            html+='<span style="color:#aaa;margin:0 8px;">vs</span>';
            html+='<span style="color:#c0392b;font-weight:600;">'+esc(p3n)+' / '+esc(p4n)+'</span>';
            html+='</div>';
          }
          // Show coach players for this round
          var coachIds=rMatches.length>0&&rMatches[0].reserveIds?rMatches[0].reserveIds:[];
          if(coachIds.length>0){
            html+='<div style="padding:8px 10px;background:#fef9e7;border:1px solid #f9e79f;border-radius:6px;margin-bottom:6px;font-size:13px;">';
            html+='<span style="font-size:10px;font-weight:600;color:#b7770d;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">📋 Coach</span>';
            var coachNames=coachIds.map(function(id){
              for(var i=0;i<matches.length;i++){if(matches[i].p1name&&matches[i].t1&&matches[i].t1[0]===id)return matches[i].p1name;}
              return getPlayerName(id);
            });
            html+='<span style="color:#b7770d;font-weight:600;">'+coachNames.map(function(n){return esc(n);}).join(' / ')+'</span>';
            html+='</div>';
          }
        }
      } else {
        // Single round
        for(var mi=0;mi<matches.length;mi++){
          var m=matches[mi];
          var p1n=m.p1name||getPlayerName(m.t1[0]);
          var p2n=m.p2name||getPlayerName(m.t1[1]);
          var p3n=m.p3name||getPlayerName(m.t2[0]);
          var p4n=m.p4name||getPlayerName(m.t2[1]);
          html+='<div style="padding:8px 10px;background:#f9f9f9;border-radius:6px;margin-bottom:6px;font-size:13px;">';
          html+='<span style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">Bane '+(mi+1)+'</span>';
          html+='<span style="color:#1d6fb5;font-weight:600;">'+esc(p1n)+' / '+esc(p2n)+'</span>';
          html+='<span style="color:#aaa;margin:0 8px;">vs</span>';
          html+='<span style="color:#c0392b;font-weight:600;">'+esc(p3n)+' / '+esc(p4n)+'</span>';
          html+='</div>';
        }
        // Coach for single round
        var coachIds=matches.length>0&&matches[0].reserveIds?matches[0].reserveIds:[];
        if(coachIds.length>0){
          html+='<div style="padding:8px 10px;background:#fef9e7;border:1px solid #f9e79f;border-radius:6px;margin-bottom:6px;font-size:13px;">';
          html+='<span style="font-size:10px;font-weight:600;color:#b7770d;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;">📋 Coach</span>';
          html+='<span style="color:#b7770d;font-weight:600;">'+coachIds.map(function(id){return esc(getPlayerName(id));}).join(' / ')+'</span>';
          html+='</div>';
        }
      }
      html+='</div>';
    }
    html+='</div>';
  }
  return html;
}

window.teamSideWarning=function(pa, pb){
  // Returns true if team has two players preferring same side
  if(!pa||!pb)return false;
  var sa=pa.side; var sb=pb.side;
  if(sa==='begge'||sb==='begge')return false;
  return sa===sb; // both same side = warning
}
window.playerSideWarn=function(player, other){
  // Returns true only for the specific player that is "out of place"
  // i.e. when both prefer same side, the one whose side matches the other is NOT warned
  // Actually we just warn both - but show the side preference as info
  if(!player||!other)return false;
  if(player.side==='begge'||other.side==='begge')return false;
  return player.side===other.side;
}

// ── HELPERS ──────────────────────────────────────────────────
function getPlayerName(id){
  // id is profiles.id - look up via profile_id on players
  for(var i=0;i<STATE.players.length;i++){
    if(STATE.players[i].profile_id===id)return STATE.players[i].name||'Ukendt';
  }
  // fallback: check allProfiles
  for(var j=0;j<STATE.allProfiles.length;j++){
    if(STATE.allProfiles[j].id===id)return STATE.allProfiles[j].name||STATE.allProfiles[j].email||'Ukendt';
  }
  return 'Ukendt';
}
function localDT(iso){
  if(!iso)return'';
  var d=new Date(iso);
  var pad=function(n){return n<10?'0'+n:String(n);};
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}

function localDTNextHour(hoursAhead){
  var d=new Date();
  d.setMinutes(0,0,0);
  d.setHours(d.getHours()+(hoursAhead||1));
  var pad=function(n){return n<10?'0'+n:String(n);};
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':00';
}

    }

    var subTeams=dpfTeams.filter(function(t){return t.parent_team_id===team.id;});

      html+='<div style="padding:10px 16px;background:#fafaf8;border-top:1px solid #f0f0f0;">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
      html+='<div style="font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;">DPF-hold ('+subTeams.length+')</div>';
      if(canManageTeams)html+='<button class="btn btn-light btn-sm" style="font-size:11px;" onclick="createDpfTeam(\''+team.id+'\')">+ DPF-hold</button>';
      html+='</div>';
      for(var si=0;si<subTeams.length;si++){
        var sub=subTeams[si];
        var subEvents=STATE.events.filter(function(e){return e.team_id===sub.id;}).filter(function(e){return new Date(e.date)>=now;});
        html+='<div style="border:1px solid #e0e0e0;border-radius:8px;margin-bottom:8px;overflow:hidden;">';
        html+='<div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:#fff;">';
        html+='<div>';
        html+='<div style="font-size:14px;font-weight:600;color:#111;">'+esc(sub.name)+'</div>';
        var divTxt=sub.division?'<span style="font-size:11px;background:#f0f0f0;color:#666;border-radius:4px;padding:1px 6px;margin-left:6px;">'+esc(sub.division)+'</span>':'';
        html+=divTxt;
        html+='<div style="font-size:11px;color:#aaa;margin-top:2px;">'+subEvents.length+' kommende kampe</div>';
        html+='</div>';
        html+='<div style="display:flex;gap:6px;">';
        html+='<button class="btn btn-dark btn-sm" style="font-size:11px;" onclick="openNewEvent(\''+sub.id+'\',\'match\')">+ Kamp</button>';
        if(canManageTeams)html+='<button class="btn btn-light btn-sm" onclick="editTeam(\''+sub.id+'\')">&#9881;</button>';
        html+='<button onclick="toggleTeam(\''+sub.id+'\')" style="background:none;border:1.5px solid #ddd;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;color:#666;">'+(STATE.openTeam===sub.id?'&#9650;':'&#9660;')+'</button>';
        html+='</div></div>';

        if(STATE.openTeam===sub.id){
          var subMemberData=STATE.teamMembersCache&&STATE.teamMembersCache[sub.id];
          html+='<div style="padding:10px 14px;background:#fafafa;">';
          if(!subMemberData){
            html+='<div style="font-size:12px;color:#aaa;">Henter...</div>';
            setTimeout(function(sid){return function(){
              loadTeamMembers(sid).then(function(members){
                if(!STATE.teamMembersCache)STATE.teamMembersCache={};
                STATE.teamMembersCache[sid]=Array.isArray(members)?members:[];
                render();
              });
            };}(sub.id),10);
          } else {
            var subReg=subMemberData.filter(function(m){return !m.is_reserve;});
            var subRes=subMemberData.filter(function(m){return m.is_reserve;});
            html+='<div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:6px;">Spillere ('+subReg.length+')</div>';
            for(var smi=0;smi<subReg.length;smi++){
              var smem=subReg[smi];
              html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;">';
              html+='<div style="display:flex;align-items:center;gap:6px;">';
              html+='<span style="font-size:12px;font-weight:500;">'+esc(getPlayerName(smem.player_id))+'</span>';
              if(smem.is_captain)html+='<span style="font-size:10px;color:#1d6fb5;">&#9733; Kap.</span>';
              html+='</div>';
              if(canSetCaptain||canManageTeams){
                html+='<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">';
                html+='<button title="'+(smem.is_captain?'Fjern som kaptajn':'G\u00f8r til kaptajn')+'" onclick="toggleCaptain(\''+smem.id+'\',\''+sub.id+'\','+(smem.is_captain?'false':'true')+')" style="background:'+(smem.is_captain?'#1d6fb5':'#f5f5f5')+';color:'+(smem.is_captain?'#fff':'#aaa')+';border:none;border-radius:6px;width:28px;height:28px;font-size:13px;cursor:pointer;">&#9733;</button>';
                if(canManageTeams)html+='<button title="Fjern fra hold" onclick="removeTeamMemberDirect(\''+smem.id+'\',\''+sub.id+'\')" style="background:#fff0f0;color:#c0392b;border:1px solid #f5b7b1;border-radius:6px;width:28px;height:28px;font-size:14px;cursor:pointer;">&#10005;</button>';
                html+='</div>';
              }
              html+='</div>';
            }
            if(subRes.length){
              html+='<div style="font-size:11px;font-weight:700;color:#b7770d;text-transform:uppercase;margin:8px 0 4px;">Reserver</div>';
              for(var sri=0;sri<subRes.length;sri++){
                var srmem=subRes[sri];
                html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;">';
                html+='<span style="font-size:12px;color:#888;">'+esc(getPlayerName(srmem.player_id))+'</span>';
                if(canManageTeams)html+='<button class="btn btn-red btn-sm" style="font-size:10px;padding:1px 5px;" onclick="removeTeamMemberDirect(\''+srmem.id+'\',\''+sub.id+'\')">&#10005;</button>';
                html+='</div>';
              }
            }
            // Add to DPF team – from parent training team
            if(canManageTeams){
              var parentMembers=(STATE.teamMembersCache&&STATE.teamMembersCache[team.id])||[];
              var availForDpf=parentMembers.filter(function(m){
                return !subMemberData.some(function(sm){return sm.player_id===m.player_id;});
              });
              if(availForDpf.length){
                html+='<div style="margin-top:8px;display:flex;gap:6px;">';
                html+='<select id="dpfAddSel_'+sub.id+'" class="finput" style="flex:1;font-size:11px;margin-bottom:0;">';
                html+='<option value="">+ Tilf\u00f8j fra tr\u00e6ningshold...</option>';
                for(var dai=0;dai<availForDpf.length;dai++){
                  var dm=availForDpf[dai];
                  html+='<option value="'+dm.player_id+'|fast">'+esc(getPlayerName(dm.player_id))+(dm.is_reserve?' (R)':'')+'</option>';
                  html+='<option value="'+dm.player_id+'|reserve">'+esc(getPlayerName(dm.player_id))+' (Reserve)</option>';
                }
                html+='</select>';
                html+='<button class="btn btn-light btn-sm" onclick="quickAddMember(\''+sub.id+'\')">Tilf\u00f8j</button>';
                html+='</div>';
              }
            }
          }
          // DPF events
          var subAllEvents=STATE.events.filter(function(e){return e.team_id===sub.id;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
          if(subAllEvents.length){
            html+='<div style="margin-top:10px;border-top:1px solid #eee;padding-top:10px;">';
            for(var sei=0;sei<subAllEvents.length;sei++){html+=rEventRow(subAllEvents[sei],sub,new Date(subAllEvents[sei].date)<now);}
            html+='</div>';
          }
          html+='</div>';
        }
        html+='</div>';
      }
      html+='</div>';
    }

    // Training events
    if(!teamEvents.length){
      html+='<div style="padding:14px 16px;font-size:13px;color:#aaa;">Ingen tr\u00e6ninger endnu</div>';
    } else {
      for(var ei=0;ei<upcoming.length;ei++){html+=rEventRow(upcoming[ei],team,false);}
      if(past.length){
        html+='<div style="padding:8px 16px;font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;border-top:1px solid #f0f0f0;">Tidligere</div>';
        for(var pi=0;pi<Math.min(3,past.length);pi++){html+=rEventRow(past[past.length-1-pi],team,true);}
      }
    }
    html+='</div>';
  }
  return html;
}


function rEventRow(ev,team,isPast){
  var responses=STATE.eventResponses.filter(function(r){return r.event_id===ev.id;});
  var yesCount=responses.filter(function(r){return r.response==='yes';}).length;
  var noCount=responses.filter(function(r){return r.response==='no';}).length;
  var d=new Date(ev.date);
  var dateStr=d.toLocaleDateString('da-DK',{weekday:'short',day:'numeric',month:'short'});
  var timeStr=d.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
  var endTimeStr=ev.end_time?new Date(ev.end_time).toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'}):null;
  var timeDisplay=endTimeStr?timeStr+'\u2013'+endTimeStr:timeStr;
  var isMatch=ev.type==='match';
  var typeColor=isMatch?'#c0392b':'#1d6fb5';
  var typeBg=isMatch?'#fdecea':'#e8f0fb';
  var typeBorder=isMatch?'#f5b7b1':'#b3cef0';
  var typeLabel=isMatch?'Kamp':'Tr&#230;ning';
  var deadline=ev.signup_deadline?new Date(ev.signup_deadline):null;
  var deadlinePast=deadline&&deadline<new Date();
  var isOpen=STATE.openEvent===ev.id;

  var html='<div style="border-top:1px solid #f0f0f0;'+(isPast?'opacity:0.65;':'')+'">';
  html+='<div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleEvent(\''+ev.id+'\')">';
  html+='<div style="flex:1;min-width:0;">';
  html+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">';
  html+='<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;border:1px solid;color:'+typeColor+';background:'+typeBg+';border-color:'+typeBorder+';">'+typeLabel+'</span>';
  if(isMatch&&ev.home_away){html+='<span style="font-size:10px;color:#888;">'+(ev.home_away==='home'?'Hjemme':'Ude')+'</span>';}
  html+='<span style="font-size:14px;font-weight:600;color:#111;">'+esc(ev.title)+'</span>';
  html+='</div>';
  html+='<div style="font-size:12px;color:#888;margin-top:3px;">'+dateStr+' &bull; '+timeDisplay;
  if(ev.location)html+=' &bull; '+esc(ev.location);
  html+='</div>';
  if(deadline){html+='<div style="font-size:11px;color:'+(deadlinePast?'#c0392b':'#b7770d')+';margin-top:2px;">Frist: '+deadline.toLocaleDateString('da-DK',{day:'numeric',month:'short'})+'</div>';}
  html+='</div>';
  html+='<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:10px;">';
  html+='<span style="font-size:13px;color:#1e8449;font-weight:700;">'+yesCount+'</span>';
  html+='<span style="font-size:12px;color:#aaa;">/</span>';
  html+='<span style="font-size:13px;color:#c0392b;font-weight:700;">'+noCount+'</span>';
  html+='<button class="btn btn-light btn-sm" onclick="event.stopPropagation();editEvent(\''+ev.id+'\')">&#9881;</button>';
  html+='<span style="color:#aaa;font-size:12px;">'+(isOpen?'&#9650;':'&#9660;')+'</span>';
  html+='</div></div>';

  if(isOpen){html+=rEventDetail(ev,responses);}
  html+='</div>';
  return html;
}

function rEventDetail(ev,responses){
  var yes=responses.filter(function(r){return r.response==='yes';});
  var no=responses.filter(function(r){return r.response==='no';});
  var unanswered=STATE.players.filter(function(p){
    return !responses.find(function(r){return r.player_id===p.id;});
  });
  var html='<div style="background:#f9f9f9;padding:14px 16px;border-top:1px solid #eee;">';

  // YES
  html+='<div style="font-size:11px;font-weight:700;color:#1e8449;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Tilmeldt ('+yes.length+')</div>';
  if(!yes.length)html+='<div style="font-size:12px;color:#aaa;margin-bottom:8px;">Ingen tilmeldt endnu</div>';
  for(var i=0;i<yes.length;i++){
    var r=yes[i];
    html+='<div style="font-size:13px;padding:5px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;">';
    html+='<span style="font-weight:500;">'+esc(getPlayerName(r.player_id))+'</span>';
    if(r.note)html+='<span style="font-size:11px;color:#888;font-style:italic;">'+esc(r.note)+'</span>';
    html+='</div>';
  }

  // NO
  html+='<div style="font-size:11px;font-weight:700;color:#c0392b;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;">Frameldt ('+no.length+')</div>';
  if(!no.length)html+='<div style="font-size:12px;color:#aaa;margin-bottom:8px;">Ingen frameldt</div>';
  for(var j=0;j<no.length;j++){
    var rn=no[j];
    html+='<div style="font-size:13px;padding:5px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;">';
    html+='<span style="font-weight:500;">'+esc(getPlayerName(rn.player_id))+'</span>';
    if(rn.note)html+='<span style="font-size:11px;color:#888;font-style:italic;">'+esc(rn.note)+'</span>';
    html+='</div>';
  }

  // NOT ANSWERED
  html+='<div style="font-size:11px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;">Ikke svaret ('+unanswered.length+')</div>';
  if(!unanswered.length)html+='<div style="font-size:12px;color:#aaa;">Alle har svaret</div>';
  for(var k=0;k<unanswered.length;k++){
    html+='<div style="font-size:13px;color:#aaa;padding:5px 0;border-bottom:1px solid #eee;">'+esc(unanswered[k].name)+'</div>';
  }

  // Actions
  html+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">';
  html+='<button class="btn btn-dark btn-sm" onclick="sendReminder(\''+ev.id+'\')">Send p&#229;mindelse til ikke-svar</button>';
  html+='<button class="btn btn-light btn-sm" onclick="showReserveInvite(\''+ev.id+'\')">Invit\u00e9r reserve</button>';
  html+='<button class="btn btn-red btn-sm" onclick="deleteEvent(\''+ev.id+'\')">Slet begivenhed</button>';
  html+='</div>';

  // Reserve invite panel
  if(STATE.reserveInvite===ev.id){
    var teamMembers=(STATE.teamMembersCache&&STATE.teamMembersCache[ev.team_id])||[];
    var reserves=teamMembers.filter(function(m){return m.is_reserve;});
    if(!reserves.length){
      html+='<div style="font-size:12px;color:#aaa;margin-top:8px;">Ingen reserver p\u00e5 dette hold</div>';
    } else {
      html+='<div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:12px;margin-top:8px;">';
      html+='<div style="font-size:11px;font-weight:700;color:#b7770d;margin-bottom:8px;">V\u00e6lg reserve at invitere</div>';
      for(var rri=0;rri<reserves.length;rri++){
        var rr=reserves[rri];
        var rrname=getPlayerName(rr.player_id);
        var alreadyInvited=responses.some(function(r){return r.player_id===rr.player_id;});
        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;">';
        html+='<span style="font-size:13px;">'+esc(rrname)+'</span>';
        if(alreadyInvited){
          html+='<span style="font-size:11px;color:#1e8449;">Allerede inviteret</span>';
        } else {
          html+='<button class="btn btn-dark btn-sm" onclick="inviteReserve(\''+ev.id+'\',\''+rr.player_id+'\')">Invit\u00e9r</button>';
        }
        html+='</div>';
      }
      html+='</div>';
    }
  }
  html+='</div>';
  return html;
}

    html+='<div style="margin-top:10px;display:flex;gap:8px;align-items:center;">';

window.addPlayerToTeam=function(sel,playerId){
  var val=sel.value;
  if(!val)return;
  sel.value='';
  var parts=val.split('|');
  var teamId=parts[0];
  var isReserve=parts[1]==='reserve';
  var profileId=null;
  for(var i=0;i<STATE.players.length;i++){
    if(STATE.players[i].id===playerId){profileId=STATE.players[i].profile_id;break;}
  }
  if(!profileId){
    // Ingen login - brug players.id direkte (foreign key constraint fjernet)
    profileId=playerId;
  }
  sbPost('team_members',{team_id:teamId,player_id:profileId,is_reserve:isReserve}).then(function(res){
    if(res&&res.code==='23505'){alert('Spilleren er allerede på dette hold.');return;}
    if(res&&(res.code||res.error)){alert('Fejl: '+JSON.stringify(res).substring(0,200));return;}
    if(!STATE.teamMembersCache)STATE.teamMembersCache={};
    delete STATE.teamMembersCache[teamId];
    loadTeamMembersCache().then(render);
  }).catch(function(e){alert('Netværksfejl: '+e.message);});
};

window.removePlayerFromTeam=function(memberId,teamId){
  sbDelete('team_members','id=eq.'+memberId).then(function(){
    if(STATE.teamMembersCache)delete STATE.teamMembersCache[teamId];
    loadTeamMembersCache().then(render);
  });
};

function loadTeamMembersCache(){
  if(!STATE.teams.length)return Promise.resolve();
  if(!STATE.teamMembersCache)STATE.teamMembersCache={};
  var teamIds=STATE.teams.map(function(t){return t.id;});
  return sbGet('team_members','team_id=in.('+teamIds.join(',')+')').then(function(data){
    STATE.teamMembersCache={};
    if(!Array.isArray(data))return;
    for(var i=0;i<data.length;i++){
      var m=data[i];
      if(!STATE.teamMembersCache[m.team_id])STATE.teamMembersCache[m.team_id]=[];
      STATE.teamMembersCache[m.team_id].push(m);
    }
  }).catch(function(){});
}

window.openNewEvent=function(teamId,type){
  STATE.editEvent={team_id:teamId,type:type||'training'};
  STATE.modal='edit_event';
  if(!STATE.teamMembersCache)STATE.teamMembersCache={};
  // Find parent team if DPF
  var parentId=null;
  for(var i=0;i<STATE.teams.length;i++){
    if(STATE.teams[i].id===teamId&&STATE.teams[i].parent_team_id){
      parentId=STATE.teams[i].parent_team_id;break;
    }
  }
  var loads=[];
  if(!STATE.teamMembersCache[teamId]){
    loads.push(loadTeamMembers(teamId).then(function(m){STATE.teamMembersCache[teamId]=Array.isArray(m)?m:[];}));
  }
  if(parentId&&!STATE.teamMembersCache[parentId]){
    loads.push(loadTeamMembers(parentId).then(function(m){STATE.teamMembersCache[parentId]=Array.isArray(m)?m:[];}));
  }
  if(loads.length){
    Promise.all(loads).then(function(){render();});
  } else {
    render();
  }
};

window.autoFillEndDate=function(){
  var dateEl=document.getElementById('evDateOnly');
  var timeEl=document.getElementById('evTimeOnly');
  var endEl=document.getElementById('evEndTime');
  if(!dateEl||!timeEl||!endEl)return;
  var start=new Date(dateEl.value+'T'+(timeEl.value||'00:00'));
  if(isNaN(start))return;
  var end=new Date(start);
  end.setHours(end.getHours()+2);
  var pad=function(n){return n<10?'0'+n:String(n);};
  endEl.value=pad(end.getHours())+':'+pad(end.getMinutes());
};

window.saveTeam=function(){
  var role=STATE.profile?STATE.profile.role:'';
  if(role!=='superadmin'&&role!=='club_admin'){alert('Ingen adgang');return;}
  var name=(document.getElementById('tmN')||{}).value||'';
  if(!name.trim()){alert('Angiv et holdnavn');return;}
  var type=(document.getElementById('tmT')||{}).value||'herre';
  var teamType=(document.getElementById('tmType')||{}).value||'training';
  var division=((document.getElementById('tmDiv')||{}).value||'').trim()||null;
  var parentId=((document.getElementById('tmParent')||{}).value||'')||null;
  var cid=clubId();
  if(role==='superadmin'){
    var clubSel=document.getElementById('tmClub');
    if(clubSel&&clubSel.value){cid=clubSel.value;}
    else if(!STATE.editTeam){alert(!STATE.allProfiles.length?'Ingen foreninger fundet':'V\u00e6lg en forening');return;}
    else{cid=STATE.editTeam.club_id;}
  }
  var data={club_id:cid,name:name.trim(),type:type,team_type:teamType,division:division,parent_team_id:parentId||null};
  var ed=STATE.editTeam;
  var p=ed&&ed.id?sbPatch('teams',data,'id=eq.'+ed.id):sbPost('teams',data);
  p.then(function(res){
    if(res&&(res.code||res.error)){alert('Fejl: '+JSON.stringify(res).substring(0,200));return;}
    STATE.editTeam=null;
    closeModal();
    loadTeams().then(function(){return loadEvents();}).then(function(){return loadEventResponses();}).then(function(){loadTeamMembersCache().then(render);});
  }).catch(function(err){alert('Netv\u00e6rksfejl: '+err.message);});
};

window.deleteTeam=function(id){
  var role=STATE.profile?STATE.profile.role:'';
  if(role!=='superadmin'&&role!=='club_admin'){alert('Ingen adgang');return;}
  if(!confirm('Slet hold? Alle begivenheder på holdet slettes også.'))return;
  sbDelete('teams','id=eq.'+id).then(function(){
    STATE.editTeam=null;
    closeModal();
    STATE.teams=STATE.teams.filter(function(t){return t.id!==id;});
    STATE.events=STATE.events.filter(function(e){return e.team_id!==id;});
    if(STATE.teamFilter===id)STATE.teamFilter='all';
    render();
    loadTeams().then(function(){return loadEvents();}).then(function(){return loadEventResponses();}).then(render);
  });
};

window.saveEvent=function(){
  var title=(document.getElementById('evT')||{}).value||'';
  if(!title.trim()){alert('Angiv en titel');return;}
  var teamId=(document.getElementById('evTeam')||{}).value;
  var dateOnly=(document.getElementById('evDateOnly')||{}).value;
  var timeOnly=(document.getElementById('evTimeOnly')||{}).value||'00:00';
  if(!dateOnly){alert('Vælg dato');return;}
  var dateVal=dateOnly+'T'+timeOnly;
  var type=(document.getElementById('evType')||{}).value||'training';
  var endTimeVal=((document.getElementById('evEndTime')||{}).value||'').trim();
  var deadlineDate=((document.getElementById('evDeadlineDate')||{}).value||'').trim();
  var deadlineTime=((document.getElementById('evDeadlineTime')||{}).value||'23:59').trim();
  var startDate=new Date(dateVal);
  var endTime=endTimeVal?(new Date(dateOnly+'T'+endTimeVal)).toISOString():null;
  var deadline=deadlineDate?(new Date(deadlineDate+'T'+deadlineTime)).toISOString():null;
  var recurType=((document.getElementById('evRecur')||{}).value||'');
  var recurEnd=((document.getElementById('evRecurEnd')||{}).value||'');
  var data={
    team_id:teamId,
    trainer_id:STATE.profile.id,
    title:title.trim(),
    type:type,
    date:startDate.toISOString(),
    end_time:endTime,
    signup_deadline:deadline||null,
    location:((document.getElementById('evLoc')||{}).value||'').trim()||null,
    notes:((document.getElementById('evNotes')||{}).value||'').trim()||null,
    opponent:type==='match'?((document.getElementById('evOpp')||{}).value||'').trim()||null:null,
    home_away:type==='match'?(document.getElementById('evHA')||{}).value||null:null
  };
  var ed=STATE.editEvent;
  if(ed&&ed.id){
    sbPatch('events',data,'id=eq.'+ed.id).then(function(res){
      if(res&&(res.code||res.error)){alert('Fejl: '+JSON.stringify(res).substring(0,200));return;}
      closeModal();
      loadEvents().then(function(){return loadEventResponses();}).then(render);
    });
  } else if(recurType&&recurEnd){
    var recId=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+Math.random().toString(36).substr(2));
    var promises=[];
    var cur=new Date(startDate);
    var endDateObj=new Date(recurEnd+'T23:59:59');
    var interval=recurType==='biweekly'?14:7;
    while(cur<=endDateObj){
      var evData=JSON.parse(JSON.stringify(data));
      evData.date=new Date(cur).toISOString();
      evData.recurrence_id=recId;
      if(endTimeVal){
        var ed2=new Date(cur);
        var p2=endTimeVal.split(':');
        ed2.setHours(parseInt(p2[0]),parseInt(p2[1]),0,0);
        if(ed2<=cur)ed2.setDate(ed2.getDate()+1);
        evData.end_time=ed2.toISOString();
      }
      promises.push(sbPost('events',evData));
      cur.setDate(cur.getDate()+interval);
    }
    Promise.all(promises).then(function(){
      closeModal();
      loadEvents().then(function(){return loadEventResponses();}).then(render);
      alert('Oprettet '+promises.length+' begivenheder i serien');
    });
  } else {
    sbPost('events',data).then(function(res){
      if(res&&(res.code||res.error)){alert('Fejl: '+JSON.stringify(res).substring(0,200));return;}
      // Read selected players BEFORE closing modal
      var cbs=document.querySelectorAll('.evPlayerCb');
      var selectedIds=[];
      for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selectedIds.push(cbs[i].value);}
      closeModal();
      // Send invitations
      if(selectedIds.length){
        var evDate=new Date(data.date);
        var dateStr=evDate.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
        var matchTitle='Udtaget til kamp: '+data.title;
        var matchBody='Du er udtaget til kampen d. '+dateStr+(data.location?' p\u00e5 '+data.location:'')+'. Bekr\u00e6ft din deltagelse i appen.';
        var emailHtml='<div style="font-family:sans-serif;max-width:480px;margin:0 auto;padding:20px;"><h2>Du er udtaget!</h2><div style="background:#e8f0fb;border:1px solid #b3cef0;border-radius:8px;padding:16px;margin:16px 0;"><strong>'+data.title+'</strong><br>'+dateStr+(data.location?'<br>'+data.location:'')+'</div><a href="https://coach.purepadel.dk" style="display:inline-block;padding:12px 24px;background:#111;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;">Bekr\u00e6ft deltagelse</a><p style="color:#888;font-size:12px;margin-top:20px;">PurePadel</p></div>';
        for(var si=0;si<selectedIds.length;si++){
          notifyPlayer(selectedIds[si],matchTitle,matchBody,matchTitle,emailHtml);
        }
      }
      loadEvents().then(function(){return loadEventResponses();}).then(render);
    });
  }
};

function rMineTraening(){
  var html='<div class="sec-head"><div class="sec-title">Mine tr\u00e6ninger</div></div>';
  var myEvents=STATE.playerEvents||[];
  var myResponses=STATE.playerResponses||[];
  var now=new Date();
  var upcoming=myEvents.filter(function(e){return new Date(e.date)>=now;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var past=myEvents.filter(function(e){return new Date(e.date)<now;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(!myEvents.length){
    html+='<div class="empty">Du er ikke tilknyttet et hold endnu.<br><small style="color:#bbb;">Bed din forening om at tilf\u00f8je dig til et hold under Hold-fanen.</small></div>';
    return html;
  }
  if(!upcoming.length){
    html+='<div style="background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:16px;text-align:center;color:#aaa;font-size:13px;margin-bottom:16px;">Ingen kommende begivenheder</div>';
  }
  for(var i=0;i<upcoming.length;i++){html+=rPlayerEventCard(upcoming[i],myResponses,false);}
  if(past.length){
    html+='<div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:16px 0 12px;">Tidligere</div>';
    for(var j=0;j<Math.min(5,past.length);j++){html+=rPlayerEventCard(past[j],myResponses,true);}
  }
  return html;
}

  var tok=STATE.session?STATE.session.access_token:null;
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/functions/v1/reset-password',true);

window.removeTrainerFromTeam=function(memberId,teamId){
  if(!confirm('Fjern trænerrolle fra dette hold?'))return;
  // Find profileId FØR vi patcher
  var profileId=null;
  for(var tk in STATE.teamMembersCache){
    var tmlist=STATE.teamMembersCache[tk];
    for(var tmi=0;tmi<tmlist.length;tmi++){
      if(tmlist[tmi].id===memberId){profileId=tmlist[tmi].player_id;break;}
    }
    if(profileId)break;
  }
  sbPatch('team_members',{is_trainer:false},'id=eq.'+memberId).then(function(){
    return loadTeamMembersCache();
  }).then(function(){
    // Tjek om personen stadig er træner på andre hold
    var stillTrainer=false;
    if(profileId){
      for(var tk2 in STATE.teamMembersCache){
        var tmlist2=STATE.teamMembersCache[tk2];
        for(var tmi2=0;tmi2<tmlist2.length;tmi2++){
          if(tmlist2[tmi2].player_id===profileId&&tmlist2[tmi2].is_trainer){stillTrainer=true;break;}
        }
      }
      if(!stillTrainer){
        return sbPatch('profiles',{role:'player'},'id=eq.'+profileId);

window.uploadLogo=function(input){
  var file=input.files[0];

  if(file.size>500*1024){alert('Filen er for stor – maks 500KB');return;}
  var status=document.getElementById('logoStatus');
  if(status)status.textContent='Uploader...';
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result;

function rPlayerEventCard(ev,responses,isPast){
  var myResp=null;
  for(var i=0;i<responses.length;i++){
    if(responses[i].event_id===ev.id){myResp=responses[i];break;}
  }
  var d=new Date(ev.date);
  var dateStr=d.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  var timeStr=d.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
  var isMatch=ev.type==='match';
  var typeColor=isMatch?'#c0392b':'#1d6fb5';
  var typeBg=isMatch?'#fdecea':'#e8f0fb';
  var typeBorder=isMatch?'#f5b7b1':'#b3cef0';
  var deadline=ev.signup_deadline?new Date(ev.signup_deadline):null;
  var deadlinePast=deadline&&deadline<new Date();
  var canRespond=!isPast&&(!deadline||!deadlinePast);

  var html='<div style="background:#fff;border:1.5px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:10px;'+(isPast?'opacity:0.7;':'')+'">';

  // Type + title
  html+='<div style="display:flex;align-items:start;justify-content:space-between;gap:8px;margin-bottom:8px;">';
  html+='<div>';
  html+='<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid;color:'+typeColor+';background:'+typeBg+';border-color:'+typeBorder+';">'+(isMatch?'Kamp':'Tr&#230;ning')+'</span>';
  if(ev._isReserveInvite)html+='<span style="font-size:10px;background:#fef9e7;color:#b7770d;border:1px solid #f9e79f;border-radius:4px;padding:2px 8px;margin-left:4px;">Reserve-invitation</span>';
  if(isMatch&&ev.home_away){html+='<span style="font-size:10px;color:#888;margin-left:6px;">'+(ev.home_away==='home'?'Hjemme':'Ude')+'</span>';}
  html+='<div style="font-size:16px;font-weight:700;color:#111;margin-top:4px;">'+esc(ev.title)+'</div>';
  if(isMatch&&ev.opponent)html+='<div style="font-size:12px;color:#888;">vs '+esc(ev.opponent)+'</div>';
  html+='</div>';

  // My current response badge
  if(myResp){
    var respColor=myResp.response==='yes'?'#1e8449':'#c0392b';
    var respBg=myResp.response==='yes'?'#eafaf1':'#fdecea';
    var respLabel=myResp.response==='yes'?'&#10003; Tilmeldt':'&#10007; Frameldt';
    html+='<span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:'+respBg+';color:'+respColor+';white-space:nowrap;">'+respLabel+'</span>';
  } else if(!isPast){
    html+='<span style="font-size:11px;color:#aaa;white-space:nowrap;">Ikke svaret</span>';
  }
  html+='</div>';

  // Date/time/location
  html+='<div style="font-size:13px;color:#555;margin-bottom:8px;">&#128197; '+dateStr+' kl. '+timeStr+'</div>';
  if(ev.location)html+='<div style="font-size:12px;color:#888;margin-bottom:8px;">&#128205; '+esc(ev.location)+'</div>';
  if(deadline){
    html+='<div style="font-size:11px;color:'+(deadlinePast?'#c0392b':'#b7770d')+';margin-bottom:8px;">'+(deadlinePast?'Frist udl&#248;bet':'Frist: ')+deadline.toLocaleDateString('da-DK',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div>';
  }
  if(ev.notes)html+='<div style="font-size:12px;color:#888;background:#f9f9f9;border-radius:6px;padding:8px;margin-bottom:10px;">'+esc(ev.notes)+'</div>';

  // Response buttons
  if(canRespond){
    if(STATE.respondingTo===ev.id){
      html+=rRespondForm(ev.id,myResp);
    } else {
      html+='<div style="display:flex;gap:8px;">';
      html+='<button class="btn btn-dark btn-sm" style="flex:1;padding:10px;" onclick="STATE.respondingTo=\''+ev.id+'\';render()">Tilmeld / Afbud</button>';
      html+='</div>';
    }
  }

  html+='</div>';
  return html;
}

  var html='<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:12px;">';
  html+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px;">Dit svar</div>';
  html+='<input class="finput" id="respNote" placeholder="Note (valgfrit, fx skadet, arbejde...)" style="margin-bottom:10px;" value="'+(existing&&existing.note?esc(existing.note):'')+'">';

// ── SPILLER ACTIONS ───────────────────────────────────────────
window.doRegister=function(){
  var name=(document.getElementById('regName')||{}).value||'';
  var email=(document.getElementById('regEmail')||{}).value||'';
  var pw=(document.getElementById('regPw')||{}).value||'';
  var clubId=(document.getElementById('regClub')||{}).value||'';
  var err=document.getElementById('regErr');
  if(!name.trim()||!email||!pw||!clubId){if(err)err.textContent='Udfyld alle felter';return;}
  if(pw.length<6){if(err)err.textContent='Password skal v\u00e6re mindst 6 tegn';return;}
  if(err)err.textContent='Opretter konto...';
  sbSignup(email,pw).then(function(data){
    if(data.error||data.error_description){
      if(err)err.textContent=data.error_description||data.error;
      return;
    }
    var userId=data.user&&data.user.id;
    if(!userId){if(err)err.textContent='Noget gik galt, pr\u00f8v igen';return;}
    // PATCH the auto-created profile with correct role/status
    sbPatch('profiles',{name:name.trim(),role:'player',club_id:clubId,status:'pending'},'id=eq.'+userId).then(function(){
      // Also create a players entry for kampopsætning
      sbPost('players',{club_id:clubId,name:name.trim(),level:3,side:'begge',notes:'',profile_id:userId}).then(function(){
        if(err)err.textContent='';
        sbAuth(email,pw).then(function(authData){
          if(authData.access_token){
            saveSession(authData);
            loadProfile().then(function(){render();});
          } else {
            if(err)err.textContent='Konto oprettet! Log ind nedenfor.';
            STATE.showRegister=false;render();
          }
        });
      });
    });
  });
};

window.submitResponse=function(evId,response){
  var note=((document.getElementById('respNote')||{}).value||'').trim();
  var playerId=STATE.profile.id;
  // Upsert via delete+insert pattern
  sbDelete('event_responses','event_id=eq.'+evId+'&player_id=eq.'+playerId).then(function(){
    return sbPost('event_responses',{event_id:evId,player_id:playerId,response:response,note:note||null});
  }).then(function(){
    STATE.respondingTo=null;
    loadPlayerData().then(render);
  });
};

function loadPlayerData(){
  var pid=STATE.profile.id;
  var cid=STATE.profile.club_id;
  if(cid){
    sbGet('profiles','id=eq.'+cid).then(function(data){
      if(Array.isArray(data)&&data.length)STATE.clubProfile=data[0];
    });
  }
  return sbGet('team_members','player_id=eq.'+pid).then(function(members){
    if(!Array.isArray(members)||!members.length){
      STATE.playerTeams=[];STATE.playerTeamMemberships=[];
      STATE.playerEvents=[];STATE.playerResponses=[];
      return Promise.resolve();
    }
    STATE.playerTeamMemberships=members;
    STATE.playerCaptainTeamIds=members.filter(function(m){return m.is_captain;}).map(function(m){return m.team_id;});
    // All teams the player is a member of (fast + reserve, not trainer)
    var allMemberTeamIds=members.filter(function(m){return !m.is_trainer;}).map(function(m){return m.team_id;});
    var regularMemberships=members.filter(function(m){return !m.is_reserve&&!m.is_trainer;});
    var regularTeamIds=regularMemberships.map(function(m){return m.team_id;});
    return sbGet('teams','id=in.('+(allMemberTeamIds.length?allMemberTeamIds.join(','):'00000000-0000-0000-0000-000000000000')+')').then(function(teams){
      STATE.playerTeams=Array.isArray(teams)?teams:[];
      // Load events from regular teams
      if(!regularTeamIds.length){STATE.playerEvents=[];STATE.playerResponses=[];return Promise.resolve();}
      return sbGet('events','team_id=in.('+regularTeamIds.join(',')+')&order=date');
    }).then(function(events){
      STATE.playerEvents=Array.isArray(events)?events:[];
      // Also load events player was specifically invited to as reserve
      return sbGet('event_responses','player_id=eq.'+pid+'&response=is.null');
    }).then(function(invitations){
      if(Array.isArray(invitations)&&invitations.length){
        var invitedEvIds=invitations.map(function(r){return r.event_id;});
        return sbGet('events','id=in.('+invitedEvIds.join(',')+')&order=date').then(function(invEvs){
          if(Array.isArray(invEvs)){
            // Merge invited events (avoid duplicates)
            var existingIds=STATE.playerEvents.map(function(e){return e.id;});
            for(var ii=0;ii<invEvs.length;ii++){
              if(existingIds.indexOf(invEvs[ii].id)<0){
                invEvs[ii]._isReserveInvite=true;
                STATE.playerEvents.push(invEvs[ii]);
              }
            }
          }
        });
      }
    }).then(function(){
      if(!STATE.playerEvents.length){STATE.playerResponses=[];return Promise.resolve();}
      var evIds=STATE.playerEvents.map(function(e){return e.id;});
      return sbGet('event_responses','event_id=in.('+evIds.join(',')+')'+'&player_id=eq.'+pid);
    }).then(function(resp){
      STATE.playerResponses=Array.isArray(resp)?resp:[];
    });
  }).catch(function(){STATE.playerTeams=[];STATE.playerEvents=[];STATE.playerResponses=[];});
}

function urlBase64ToUint8Array(base64String){
  var padding='='.repeat((4-base64String.length%4)%4);
  var base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  var rawData=atob(base64);
  var outputArray=new Uint8Array(rawData.length);
  for(var i=0;i<rawData.length;i++){outputArray[i]=rawData.charCodeAt(i);}
  return outputArray;
}

function registerServiceWorker(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return Promise.resolve(null);
  return navigator.serviceWorker.register('/service-worker.js').then(function(reg){
    console.log('SW registered');
    return reg;
  }).catch(function(e){console.log('SW error:',e);return null;});
}

function subscribeToPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
  if(!STATE.session||!STATE.profile)return;
  navigator.serviceWorker.ready.then(function(reg){
    reg.pushManager.getSubscription().then(function(existing){
      if(existing){saveSubscription(existing);return;}
      reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      }).then(function(sub){
        saveSubscription(sub);
        render(); // refresh bell icon
      }).catch(function(e){console.log('Push subscribe error:',e);});
    });
  });
}

window.enablePush=function(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  var isChrome=/Chrome/.test(navigator.userAgent)&&!/Chromium|Edge/.test(navigator.userAgent);
  if(isIOS&&isChrome){
    alert('Chrome p\u00e5 iPhone/iPad underst\u00f8tter ikke push-notifikationer.\n\nBrug i stedet:\n\u2022 Email-notifikationer\n\u2022 Eller \u00e5bn siden i Safari og tilf\u00f8j til hjemmeskærmen');
    return;
  }
  if(!('Notification' in window)){alert('Din browser underst\u00f8tter ikke notifikationer');return;}
  if(Notification.permission==='granted'){
    // Already granted - just subscribe silently
    subscribeToPush();
    return;
  }
  Notification.requestPermission().then(function(perm){
    if(perm==='granted'){
      subscribeToPush();
      render();
    } else {
      alert('Du har blokeret notifikationer.\nG\u00e5 til browserindstillinger for at sl\u00e5 dem til.');
    }
  });
};

function saveSubscription(sub){
  var pid=STATE.profile.id;
  var subJson=JSON.stringify(sub.toJSON());
  sbGet('push_subscriptions','player_id=eq.'+pid).then(function(data){
    if(Array.isArray(data)&&data.length){
      sbPatch('push_subscriptions',{subscription:subJson},'player_id=eq.'+pid);
    } else {
      sbPost('push_subscriptions',{player_id:pid,subscription:subJson});
    }
  });
}

    for(var tci=0;tci<captainTeamIds.length;tci++){
      var tm=STATE.teamMembersCache&&STATE.teamMembersCache[captainTeamIds[tci]]||[];

    }
  }

}
