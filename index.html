window.exportPlayersExcel=function(clubIdFilter){
  if(typeof XLSX==='undefined'){alert('Excel-bibliotek ikke indlæst endnu, prøv igen om et sekund.');return;}
  var role=STATE.profile?STATE.profile.role:'';
  var profiles=STATE.allProfiles||[];
  var allPlayers=STATE.players||[];
  var teams=STATE.teams||[];
  var cache=STATE.teamMembersCache||{};

  // Foreningsfilter: superadmin kan angive clubIdFilter, club_admin bruger altid eget club_id
  var filterClubId=null;
  if(role==='superadmin'){
    filterClubId=clubIdFilter||null;
  } else {
    filterClubId=clubId();
  }

  var players=filterClubId
    ?allPlayers.filter(function(pl){return pl.club_id===filterClubId;})
    :allPlayers;

  // Byg opslag: player.id → profil
  var profByPlayerId={};
  players.forEach(function(pl){
    if(pl.profile_id){
      var pr=profiles.filter(function(p){return p.id===pl.profile_id;})[0];
      if(pr)profByPlayerId[pl.id]=pr;
    }
  });

  // Byg opslag: player.id → hold-info
  var membersByPlayerId={};
  Object.keys(cache).forEach(function(teamId){
    var team=teams.filter(function(t){return t.id===teamId;})[0];
    if(!team)return;
    cache[teamId].forEach(function(tm){
      if(!membersByPlayerId[tm.player_id])membersByPlayerId[tm.player_id]=[];
      membersByPlayerId[tm.player_id].push({team:team,tm:tm});
    });
  });

  var sideMap={'højre':'Højre','venstre':'Venstre','begge':'Begge','':''};

  var rows=players.map(function(pl){
    var pr=profByPlayerId[pl.id]||{};
    var memberships=membersByPlayerId[pl.id]||[];
    var holdNavne=memberships.map(function(m){return m.team.name;}).join(', ');
    var holdTyper=memberships.map(function(m){return m.team.team_type==='dpf'?'DPF':'Træning';}).join(', ');
    var erKaptajn=memberships.some(function(m){return m.tm.is_captain;})?'Ja':'';
    var erReserve=memberships.some(function(m){return m.tm.is_reserve;})?'Ja':'';
    var erTraener=memberships.some(function(m){return m.tm.is_trainer;})?'Ja':'';
    var kaptajnHold=memberships.filter(function(m){return m.tm.is_captain;}).map(function(m){return m.team.name;}).join(', ');
    var harLogin=pr.email?'Ja':'Nej';
    var subExpires=pr.subscription_expires?pr.subscription_expires.split('T')[0]:'';
    var subStatus='';
    if(pr.subscription_expires){
      var days=Math.floor((new Date(pr.subscription_expires)-new Date())/86400000);
      subStatus=days<0?'Udløbet':days<30?'Udløber snart':'Aktiv';
    }
    // Find foreningsnavn
    var clubProfile=profiles.filter(function(p){return p.id===pl.club_id;})[0];
    var foreningNavn=clubProfile?(clubProfile.club_name||clubProfile.name||pl.club_id):(pl.club_id||'');
    return {
      'Forening': foreningNavn,
      'Navn': pl.name||pr.name||'',
      'Email': pr.email||'',
      'Niveau': pl.level||'',
      'Side': sideMap[pl.side]||pl.side||'',
      'Noter': pl.notes||'',
      'Hold': holdNavne,
      'Holdtype': holdTyper,
      'Kaptajn': erKaptajn,
      'Kaptajn for hold': kaptajnHold,
      'Reserve': erReserve,
      'Træner': erTraener,
      'Har login': harLogin,
      'Rolle': pr.role||'',
      'Status': pr.status||'',
      'Push aktiv': pr.notify_push!==false?'Ja':'Nej',
      'Email notif.': pr.notify_email!==false?'Ja':'Nej',
      'Abonnement udløber': subExpires,
      'Abonnement status': subStatus,
      'Oprettet': pl.created_at?(pl.created_at.split('T')[0]):'',
      'Sidst set': pr.last_seen?(pr.last_seen.split('T')[0]):''
    };
  });

  // Sorter efter forening, derefter navn
  rows.sort(function(a,b){
    var fc=(a['Forening']||'').localeCompare(b['Forening']||'','da');
    if(fc!==0)return fc;
    return (a['Navn']||'').localeCompare(b['Navn']||'','da');
  });

  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[
    {wch:20},{wch:22},{wch:28},{wch:8},{wch:10},{wch:20},
    {wch:30},{wch:16},{wch:10},{wch:24},{wch:10},
    {wch:10},{wch:10},{wch:12},{wch:10},{wch:12},
    {wch:14},{wch:20},{wch:18},{wch:14},{wch:14}
  ];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Spillere');
  var dato=new Date().toISOString().split('T')[0];
  var clubSuffix=filterClubId?(rows[0]&&rows[0]['Forening']?'-'+rows[0]['Forening'].replace(/\s+/g,'-'):''):'-alle';
  XLSX.writeFile(wb,'purepadel-spillere'+clubSuffix+'-'+dato+'.xlsx');
};

window.genMatches=function(){
  if(STATE.att.length<4)return;
  var allP=STATE.players;
  var ps=[];
  for(var i=0;i<STATE.att.length;i++){for(var j=0;j<allP.length;j++)if(allP[j].id===STATE.att[i]){ps.push(allP[j]);break;}}

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function sideScore(p){
    // venstre=0, begge=1, hojre=2 - for sorting within team
    if(p.side==='venstre')return 0;
    if(p.side==='begge')return 1;
    return 2;
  }

  function goodPair(a, b){
    // Returns true if a+b make a good side combination
    if(a.side==='begge'||b.side==='begge')return true;
    return a.side!==b.side; // one left + one right
  }

  function makePairs(grp, mode){
    var m=[];
    if(mode==='balanced'){
      grp.sort(function(a,b){return b.level-a.level;});
      for(var i=0;i<grp.length-3;i+=4){
        var g=grp.slice(i,i+4);
        // Try to make good side pairs: best+worst vs 2nd+3rd
        // Check if swapping gives better side balance
        var t1a=[g[0],g[3]], t2a=[g[1],g[2]]; // default
        var t1b=[g[0],g[1]], t2b=[g[2],g[3]]; // alt 1
        var t1c=[g[0],g[2]], t2c=[g[1],g[3]]; // alt 2
        function pairScore(t1,t2){
          var s=0;
          if(goodPair(t1[0],t1[1]))s++;
          if(goodPair(t2[0],t2[1]))s++;
          return s;
        }
        var best={t1:t1a,t2:t2a,s:pairScore(t1a,t2a)};
        if(pairScore(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:pairScore(t1b,t2b)};
        if(pairScore(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:pairScore(t1c,t2c)};
        m.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
      }
    } else if(mode==='split'){
      grp.sort(function(a,b){return b.level-a.level;});
      var h=Math.floor(grp.length/2);
      var top=shuffle(grp.slice(0,h));var bot=shuffle(grp.slice(h));
      function splitPairs(arr){
        var res=[];
        for(var i=0;i<arr.length-3;i+=4){
          var g=arr.slice(i,i+4);
          var t1a=[g[0],g[1]],t2a=[g[2],g[3]];
          var t1b=[g[0],g[2]],t2b=[g[1],g[3]];
          var t1c=[g[0],g[3]],t2c=[g[1],g[2]];
          function ps2(t1,t2){var s=0;if(goodPair(t1[0],t1[1]))s++;if(goodPair(t2[0],t2[1]))s++;return s;}
          var best={t1:t1a,t2:t2a,s:ps2(t1a,t2a)};
          if(ps2(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:ps2(t1b,t2b)};
          if(ps2(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:ps2(t1c,t2c)};
          res.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
        }
        return res;
      }
      // If both halves have at least 4 players each, split within each group
      // Otherwise pair across top vs bottom (works with just 4 players total)
      if(top.length>=4&&bot.length>=4){
        m=splitPairs(top).concat(splitPairs(bot));
      } else {
        // Pair top half vs bottom half directly
        var combined=[];
        var pairs=Math.min(top.length,bot.length);
        for(var qi=0;qi+1<pairs;qi+=2){
          var g2=[top[qi],top[qi+1],bot[qi],bot[qi+1]];
          var ta=[g2[0],g2[1]],tb=[g2[2],g2[3]];
          m.push({t1:[ta[0].id,ta[1].id],t2:[tb[0].id,tb[1].id]});
        }
        // Fallback: if we got nothing (e.g. odd halves), use balanced
        if(!m.length) m=makePairs(grp,'balanced');
      }
    } else {
      grp=shuffle(grp);
      for(var i=0;i<grp.length-3;i+=4){
        var g=grp.slice(i,i+4);
        var t1a=[g[0],g[1]],t2a=[g[2],g[3]];
        var t1b=[g[0],g[2]],t2b=[g[1],g[3]];
        var t1c=[g[0],g[3]],t2c=[g[1],g[2]];
        function pr(t1,t2){var s=0;if(goodPair(t1[0],t1[1]))s++;if(goodPair(t2[0],t2[1]))s++;return s;}
        var best={t1:t1a,t2:t2a,s:pr(t1a,t2a)};
        if(pr(t1b,t2b)>best.s)best={t1:t1b,t2:t2b,s:pr(t1b,t2b)};
        if(pr(t1c,t2c)>best.s)best={t1:t1c,t2:t2c,s:pr(t1c,t2c)};
        m.push({t1:[best.t1[0].id,best.t1[1].id],t2:[best.t2[0].id,best.t2[1].id]});
      }
    }
    return m;
  }

  var grpSize=STATE.baneGroups||0;
  var rounds=STATE.rounds||1;
  var playersPerRound=Math.floor(ps.length/4)*4;
  var reserveCount=ps.length-playersPerRound;
  var allMatches=[];

  for(var r=0;r<rounds;r++){
    var roundPlayers, roundReserves=[];
    if(reserveCount>0){
      var sorted=ps.slice().sort(function(a,b){return a.id>b.id?1:-1;});
      var startIdx=(r*reserveCount)%ps.length;
      for(var i=0;i<reserveCount;i++) roundReserves.push(sorted[(startIdx+i)%ps.length]);
      roundPlayers=ps.filter(function(p){return roundReserves.indexOf(p)===-1;});
    } else {
      roundPlayers=shuffle(ps.slice());
    }
    var m=[];
    if(grpSize>=2&&roundPlayers.length>=grpSize*4){
      m=makePairs(roundPlayers.slice(0,grpSize*4),STATE.matchMode).concat(makePairs(roundPlayers.slice(grpSize*4),STATE.matchMode));
    } else {
      m=makePairs(roundPlayers,STATE.matchMode);
    }
    var resIds=roundReserves.map(function(p){return p.id;});
    for(var i=0;i<m.length;i++){m[i].round=r+1;m[i].reserveIds=resIds;}
    allMatches=allMatches.concat(m);
  }
  STATE.matches=allMatches;render();
};

window.parseImp=function(){
  var raw=(document.getElementById('ppPaste')||{}).value||'';
  if(!raw.trim()){STATE.irows=[];render();return;}
  var rows=raw.trim().split('\n');var parsed=[];
  var firstRow=rows[0]?rows[0].split('\t'):[];
  var hasHeader=firstRow[0]&&firstRow[0].toLowerCase()==='navn';
  var si=hasHeader?1:0;
  // Detect if 2nd column is email or level
  var hasEmail=hasHeader&&firstRow[1]&&firstRow[1].toLowerCase()==='email';
  var sm={hojre:'hojre',right:'hojre',venstre:'venstre',left:'venstre',begge:'begge',both:'begge',alle:'begge','':'begge'};
  for(var i=si;i<rows.length;i++){
    var r=rows[i].split('\t');var nm=(r[0]||'').trim();if(!nm)continue;
    var email='',levelCol=1,sideCol=2,notesCol=3;
    if(hasEmail){email=(r[1]||'').trim();levelCol=2;sideCol=3;notesCol=4;}
    // Also auto-detect email by @ sign
    else if(r[1]&&r[1].indexOf('@')>0){email=r[1].trim();levelCol=2;sideCol=3;notesCol=4;}
    var lv=Math.min(5,Math.max(1,parseInt(r[levelCol])||3));
    var sd=(r[sideCol]||'').toLowerCase().trim().replace(/ø/g,'o');
    var errs=[];
    if(!nm)errs.push('Navn mangler');
    if(email&&email.indexOf('@')<0)errs.push('Ugyldig email');
    parsed.push({name:nm,email:email,level:lv,side:sm[sd]||'begge',notes:(r[notesCol]||'').trim(),errs:errs});
  }
  STATE.irows=parsed;render();
  setTimeout(function(){var el=document.getElementById('ppPaste');if(el)el.value=raw;},0);
};

  var impClubSel=document.getElementById('impClubId');

  }
  var withEmail=ok.filter(function(p){return p.email;});
  var withoutEmail=ok.filter(function(p){return !p.email;});
  var promises=[];
  // Players without email - just create players entry
  for(var i=0;i<withoutEmail.length;i++){

  // Players with email - create auth + profile + players
  var emailPromises=withEmail.map(function(p){

      createAuthUser(p.email,pw,p.name,'player',cid,null,function(err,data){

          // Fejl - opret spiller uden login
          sbPost('players',{club_id:cid,name:p.name,level:p.level,side:p.side,notes:p.notes}).then(resolve);
          return;
        }
        var uid=data.id||data.user.id;
        sbPost('players',{club_id:cid,name:p.name,level:p.level,side:p.side,notes:p.notes,profile_id:uid}).then(function(){
          var emailHtml='<div style="font-family:sans-serif;max-width:480px;margin:0 auto;padding:20px;">'

            +'<p>Din konto er oprettet. Log ind med:</p>'
            +'<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:16px;margin:16px 0;">'
            +'<strong>Email:</strong> '+p.email+'<br><strong>Password:</strong> '+pw+'</div>'
            +'<a href="https://coach.purepadel.dk" style="display:inline-block;padding:12px 24px;background:#111;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;">Log ind nu</a>'
            +'<p style="color:#888;font-size:12px;margin-top:20px;">PurePadel</p></div>';
          sendEmailToPlayer(uid,'Velkommen til PurePadel','Din konto er oprettet.\n\nEmail: '+p.email+'\nPassword: '+pw+'\n\nLog ind på: https://coach.purepadel.dk',emailHtml);
          resolve();
        });
      });
    });
  });
  Promise.all(promises.concat(emailPromises)).then(function(){
    STATE.irows=[];STATE.showImp=false;
    loadPlayers().then(function(){render();setTimeout(function(){var el=document.getElementById('impOk');if(el){el.style.display='block';el.textContent='\u2713 '+ok.length+' spillere importeret'+(withEmail.length?' ('+withEmail.length+' med login)':'')+'!';}},50);});

window.sendTestPush=function(){
  var sel=document.getElementById('pushTestTarget');
  if(!sel||!sel.value){alert('Vælg en modtager først');return;}
  var profileId=sel.value;
  var now=new Date();
  var upcoming=STATE.events.filter(function(e){return new Date(e.date)>=now;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var testEventId=upcoming.length?upcoming[0].id:null;
  sendPushToPlayer(profileId,'Test notifikation',testEventId?'Tryk for at aabne: '+upcoming[0].title:'PurePadel Coach test push',testEventId,function(ok,err){
    if(ok) alert('Push sendt! Tjek telefonen.');
    else alert('Push fejlede: '+err);
  });
};

function sendPushToPlayer(profileId,title,body,eventId,callback){
  var tok=STATE.session?STATE.session.access_token:null;
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/functions/v1/send-push',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+tok);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.onload=function(){
    if(xhr.status===200){if(callback)callback(true,null);}
    else{if(callback)callback(false,xhr.status+': '+xhr.responseText);}
  };
  xhr.onerror=function(){if(callback)callback(false,'Netvaerksfejl');}
  xhr.send(JSON.stringify({player_id:profileId,title:title,body:body,eventId:eventId||null,url:'https://coach.purepadel.dk'+(eventId?'?event='+eventId:'')}));
}

function sendEmailToPlayer(profileId,subject,text,html){
  var tok=STATE.session?STATE.session.access_token:null;
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/functions/v1/send-email',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+tok);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.send(JSON.stringify({player_id:profileId,subject:subject,text:text,html:html||null}));
}

function notifyPlayer(profileId,title,body,emailSubject,emailHtml,eventId){
  var pr=(STATE.allProfiles||[]).filter(function(p){return p.id===profileId;})[0]||{};
  var hasPush=pr.notify_push!==false;
  var hasEmail=pr.notify_email!==false&&!!pr.email;
  if(hasPush)sendPushToPlayer(profileId,title,body,eventId);
  if(hasEmail)sendEmailToPlayer(profileId,emailSubject||title,body,emailHtml||null);
  if(!hasPush&&!hasEmail)console.warn('Ingen notifikationskanal for '+(pr.name||profileId));
}

window.rejectPlayer=function(id){
  if(!confirm('Afvis spiller?'))return;
  sbPatch('profiles',{status:'rejected'},'id=eq.'+id).then(function(){
    loadAllProfiles().then(render);
  });
};

window.toggleClubVisible=function(id,visible){

};

window.saveEditUser=function(){
  var p=STATE.editUserProfile;if(!p)return;
  var name=(document.getElementById('euN')||{}).value||'';
  if(!name.trim()){alert('Angiv et navn');return;}
  var clubName=(document.getElementById('euCN')||{}).value||'';
  var type=(document.getElementById('euT')||{}).value||'trainer';
  var exp=(document.getElementById('euExp')||{}).value||null;
  var isPlayerCb=document.getElementById('euIsPlayer');
  var isPlayer=isPlayerCb?isPlayerCb.checked:p.is_player;
  var statusEl=document.getElementById('euStatus');
  var status=statusEl?statusEl.value:(p.status||'active');
  var role=type==='club'?'club_admin':type==='player'?'player':'trainer';
  var data={
    name:name.trim()||null,
    club_name:clubName.trim()||null,
    subscription_type:type==='player'?p.subscription_type:type,
    role:role,
    is_player:isPlayer,
    status:status,
    subscription_expires:exp?exp+'T00:00:00Z':null
  };
  sbPatch('profiles',data,'id=eq.'+p.id).then(function(){
    if(isPlayer){
      sbGet('players','profile_id=eq.'+p.id).then(function(existing){
        if(!Array.isArray(existing)||!existing.length){
          var cid=p.club_id||clubId();
          sbPost('players',{club_id:cid,name:name.trim()||p.name||p.email,level:3,side:'begge',notes:'',profile_id:p.id});
        }
      });
    }
    closeModal();
    loadAllProfiles().then(function(){return loadPlayers();}).then(render);
  });
};

window.createUser=function(){
  var name=(document.getElementById('uN')||{}).value||'';
  var email=(document.getElementById('uE')||{}).value||'';
  var pw=(document.getElementById('uP')||{}).value||'';
  var clubName=(document.getElementById('uCN')||{}).value||'';
  var type=(document.getElementById('uT')||{}).value||'trainer';
  var exp=(document.getElementById('uExp')||{}).value||'';
  var sendMail=document.getElementById('uSendMail')&&document.getElementById('uSendMail').checked;
  if(!email||!pw){alert('Email og password er p\u00e5kr\u00e6vet');return;}
  if(pw.length<6){alert('Password skal v\u00e6re mindst 6 tegn');return;}
  var role=type==='club'?'club_admin':type==='player'?'player':'trainer';
  var tok=STATE.session?STATE.session.access_token:null;
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/functions/v1/create-user',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+tok);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.onload=function(){
    var res={};
    try{res=JSON.parse(xhr.responseText);}catch(e){}
    if(xhr.status===200&&res.ok){
      var uid=res.uid;
      var profileData={name:name||email,role:role,club_name:clubName||name,subscription_type:type==='player'?'player':type,subscription_expires:exp||(type==='player'?null:'2099-12-31'),status:type==='player'?'active':null};
      sbFetch('PATCH','/rest/v1/profiles?id=eq.'+uid,profileData,SB_KEY).then(function(){
        if(type==='player'){sbPost('players',{club_id:clubId(),name:name||email,level:3,side:'begge',notes:'',profile_id:uid});}
        if(sendMail){
          var emailHtml='<div style="font-family:sans-serif;max-width:480px;margin:0 auto;padding:20px;">'
            +'<h2 style="color:#111;">Velkommen til PurePadel</h2>'
            +'<p>Din konto er oprettet. Her er dine login-oplysninger:</p>'
            +'<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:16px;margin:16px 0;">'
            +'<strong>Email:</strong> '+email+'<br><strong>Password:</strong> '+pw+'</div>'
            +'<a href="https://coach.purepadel.dk" style="display:inline-block;padding:12px 24px;background:#111;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;">Log ind nu</a>'
            +'<p style="color:#888;font-size:12px;margin-top:20px;">PurePadel</p></div>';
          sendEmailToPlayer(uid,'Velkommen til PurePadel','Din konto er oprettet på coach.purepadel.dk\n\nEmail: '+email+'\nPassword: '+pw,emailHtml);
        }
        closeModal();loadAllProfiles().then(render);
      });
    } else {
      alert('Fejl: '+(res.error||xhr.responseText));
    }
  };
  xhr.send(JSON.stringify({email:email,password:pw,name:name,role:role,clubId:clubId()}));
};

window.renewUser=function(id){
  var months=prompt('Forny med hvor mange m\u00e5neder?','6');
  if(!months)return;
  var m=parseInt(months)||6;
  var existing=STATE.allProfiles.filter(function(p){return p.id===id;})[0];
  var base=existing&&existing.subscription_expires&&new Date(existing.subscription_expires)>new Date()?new Date(existing.subscription_expires):new Date();
  base.setMonth(base.getMonth()+m);
  var newDate=base.toISOString().split('T')[0];
  sbPatch('profiles',{subscription_expires:newDate},'id=eq.'+id).then(function(){loadAllProfiles().then(render);});
};

window.deleteUser=function(id){
  console.log('deleteUser kaldt med id:', id);
  if(!id){alert('Fejl: intet bruger-id');return;}
  if(!confirm('Slet bruger permanent? Handlingen kan ikke fortrydes.'))return;
  var tok=STATE.session?STATE.session.access_token:null;
  if(!tok){alert('Ikke logget ind');return;}
  // Slet fra profiles og players direkte (ingen edge function nødvendig)
  sbDelete('players','profile_id=eq.'+id).then(function(){
    return sbDelete('profiles','id=eq.'+id);
  }).then(function(){
    // Forsøg også at slette auth-bruger via edge function
    var xhr=new XMLHttpRequest();
    xhr.open('POST',SB_URL+'/functions/v1/delete-user',true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('Authorization','Bearer '+tok);
    xhr.setRequestHeader('apikey',SB_KEY);
    xhr.onload=function(){
      console.log('delete-user status:', xhr.status, xhr.responseText);
      loadAllProfiles().then(function(){return loadPlayers();}).then(render);
    };
    xhr.onerror=function(){
      console.warn('Edge function fejlede, men profil er slettet');
      loadAllProfiles().then(function(){return loadPlayers();}).then(render);
    };
    xhr.send(JSON.stringify({userId:id}));
  });
};

window.toggleSession=function(id){STATE.openSession=STATE.openSession===id?null:id;render();};
window.deleteSession=function(id){if(!confirm('Slet denne træning?'))return;sbDelete('sessions','id=eq.'+id).then(function(){loadSessions().then(render);});};
window.promptSaveSession=function(){
  var name=prompt('Navn på træningen:','Uge '+getWeekNumber(new Date())+' – '+new Date().toLocaleDateString('da-DK',{weekday:'long'}));
  if(!name)return;
  // Store player names in matches for historical lookup
  var matchesWithNames=STATE.matches.map(function(m){
    return {
      t1:m.t1,t2:m.t2,round:m.round||1,
      p1name:getPlayerName(m.t1[0]),p2name:getPlayerName(m.t1[1]),
      p3name:getPlayerName(m.t2[0]),p4name:getPlayerName(m.t2[1])
    };
  });
  var data={
    club_id:clubId(),
    name:name,
    date:new Date().toISOString().split('T')[0],
    player_ids:STATE.att,
    matches:matchesWithNames,
    rounds:STATE.rounds||1
  };
  sbPost('sessions',data).then(function(result){
    console.log('Session post result:', JSON.stringify(result));
    if(result && !result.error && !result.code){
      loadSessions().then(function(){
        render();
        alert('Træning gemt under Historik!');
      });
    } else {
      alert('Fejl ved gemning: '+(result.message||result.error||result.code||JSON.stringify(result)));
    }
  }).catch(function(err){
    alert('Netværksfejl: '+err.message);
  });
};
function getWeekNumber(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));var y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7);}

loadSession();
render();
if(STATE.session&&STATE.session.access_token){
  loadProfile().then(function(){
    if(STATE.profile&&STATE.profile.id){loadAll();}
    else{STATE.session=null;localStorage.removeItem('pp_session');render();}
  }).catch(function(){STATE.session=null;localStorage.removeItem('pp_session');render();});
}
